<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Paiement — CASE du Bois de Nèfles</title>
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
<style>
  :root{--brand:#127a51;--brand-dk:#0f6b46;--ink:#16302a;--muted:#62756b;--bg:#f6f8f5;--card:#fff;--line:#e7efe9;}
  *{box-sizing:border-box}
  body{margin:0;font-family:'Inter',-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
       background:var(--bg);color:var(--ink);line-height:1.5;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:18px;box-shadow:0 8px 28px rgba(16,60,40,.08);max-width:440px;width:100%;padding:30px 26px;text-align:center}
  .logo{font-weight:800;color:var(--brand);font-size:14px;letter-spacing:.4px;text-transform:uppercase}
  h1{font-size:20px;margin:14px 0 2px}
  .sub{color:var(--muted);font-size:14px}
  .montant{font-size:42px;font-weight:800;color:var(--brand-dk);margin:16px 0 6px;letter-spacing:-1px}
  button{background:var(--brand);color:#fff;border:0;border-radius:12px;padding:15px 22px;font-size:16px;font-weight:700;width:100%;cursor:pointer;margin-top:8px}
  button:hover{background:var(--brand-dk)}
  button:disabled{opacity:.6;cursor:default}
  .secure{color:var(--muted);font-size:12px;margin-top:16px}
  .state{padding:16px;border-radius:12px;font-size:15px}
  .ok{background:#e9f8f0;color:#0f6b46}
  .err{background:#fdecea;color:#b3402c}
  .muted{color:var(--muted)}
</style>
</head>
<body>
<div class="card">
  <div class="logo">CASE du Bois de Nèfles</div>
  <div id="content"><p class="muted">Chargement…</p></div>
  <div class="secure">🔒 Paiement sécurisé par HelloAsso — 100 % gratuit pour l'association</div>
</div>
<script>
const SB_URL = "https://dkidtwypclpwznleiqnq.supabase.co";
const SB_ANON = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRraWR0d3lwY2xwd3pubGVpcW5xIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA2Nzc3MDgsImV4cCI6MjA5NjI1MzcwOH0.UDvx2B_c5ZRmt9rJ4ideribmIlp6NJkbW7hgmNZ9J9E";
const params = new URLSearchParams(location.search);
const token = (params.get('t') || params.get('token') || '').trim();
const retour = location.origin + location.pathname + '?t=' + encodeURIComponent(token);
const C = document.getElementById('content');
const euro = c => (c/100).toLocaleString('fr-FR',{minimumFractionDigits:2}) + ' €';

async function rpc(fn, body){
  try{
    const r = await fetch(SB_URL+'/rest/v1/rpc/'+fn, {method:'POST',
      headers:{'Content-Type':'application/json','apikey':SB_ANON,'Authorization':'Bearer '+SB_ANON},
      body: JSON.stringify(body)});
    return r.ok ? await r.json() : null;
  }catch(e){ return null; }
}
async function payer(btn){
  btn.disabled = true; btn.textContent = 'Ouverture du paiement…';
  try{
    const r = await fetch(SB_URL+'/functions/v1/helloasso-creer-paiement', {method:'POST',
      headers:{'Content-Type':'application/json','apikey':SB_ANON},
      body: JSON.stringify({pay_token: token, retour_url: retour})});
    const j = await r.json();
    if(j.redirectUrl){ location.href = j.redirectUrl; return; }
    if(j.error === 'deja_paye'){ render({deja_paye:true}); return; }
    throw new Error(j.error || 'erreur');
  }catch(e){
    C.innerHTML = '<div class="state err">Impossible d’ouvrir le paiement pour le moment. Réessaie dans un instant, ou contacte le CASE.</div>';
  }
}
function render(d){
  if(params.get('paiement') === 'ok'){
    C.innerHTML = '<div class="state ok"><strong>Merci ❤️</strong><br>Votre paiement a bien été pris en compte. Un justificatif de paiement vous est envoyé par HelloAsso.</div>'; return;
  }
  if(params.get('paiement') === 'erreur'){
    C.innerHTML = '<div class="state err">Le paiement n’a pas abouti. Vous pouvez réessayer.</div>'; return;
  }
  if(!token){ C.innerHTML = '<div class="state err">Lien de paiement invalide.</div>'; return; }
  if(!d){ C.innerHTML = '<div class="state err">Ce lien de paiement n’est pas (ou plus) valide.<br>Contactez le CASE pour en obtenir un nouveau.</div>'; return; }
  if(d.deja_paye){ C.innerHTML = '<div class="state ok"><strong>Déjà réglé ✔</strong><br>Ce périscolaire a déjà été payé. Merci !</div>'; return; }
  C.innerHTML = '<h1>'+(d.libelle||'Paiement')+'</h1>'
    + '<div class="sub">Montant à régler</div>'
    + '<div class="montant">'+euro(d.montant_cents)+'</div>'
    + '<button id="b">Payer en ligne</button>'
    + '<div class="muted" style="font-size:12px;margin-top:12px">💡 HelloAsso vous proposera une <b>contribution facultative</b> en plus du montant : elle soutient HelloAsso et <b>ne revient pas au CASE</b>. Vous pouvez la mettre à <b>0 €</b> — seul le montant ci-dessus est dû au CASE.</div>';
  document.getElementById('b').onclick = function(){ payer(this); };
}
(async function(){
  if(params.get('paiement')){ render(); return; }
  if(!token){ render(); return; }
  const d = await rpc('peri_paiement_public', {p_token: token});
  render(d);
})();
</script>
</body>
</html>
