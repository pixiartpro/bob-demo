<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mon espace intervenant — CASE du Bois de Nèfles</title>
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
<link rel="icon" type="image/png" sizes="16x16" href="favicon-16.png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{--vert:#1f9d6b;--vert-fonce:#0f6b46;--jaune:#f4b740;--ananas:#dc8f38;--ink:#1d3a2e;--muted:#5c7468;
        --bg:#fffef7;--card:#fff;--line:#e7efe9;--shadow:0 6px 22px rgba(20,60,40,.10);--shadow-lg:0 16px 44px rgba(20,60,40,.16)}
  *{box-sizing:border-box}
  body{margin:0;font-family:'Inter',-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;color:var(--ink);background:var(--bg);line-height:1.6}
  h1,h2,h3,h4,.logo,.hello,h2.title,.hubname{font-family:'Poppins',sans-serif}
  .wrap{max-width:900px;margin:0 auto;padding:0 20px}
  header{position:sticky;top:0;z-index:50;background:rgba(255,255,255,.93);backdrop-filter:blur(8px);border-bottom:1px solid var(--line)}
  header .bar{display:flex;align-items:center;gap:12px;padding:12px 20px;max-width:900px;margin:0 auto}
  .logo{display:flex;align-items:center;gap:10px;font-weight:900;font-size:17px;text-decoration:none}
  .logo .pine{font-size:28px} .logo b{color:var(--vert)} .logo span{color:var(--ananas)}
  header nav{margin-left:auto;display:flex;gap:8px;align-items:center}
  header nav a,header nav button{padding:8px 12px;border-radius:10px;font-weight:600;font-size:14px;text-decoration:none;color:var(--muted);background:none;border:none;cursor:pointer;font-family:inherit}
  header nav a:hover,header nav button:hover{background:#f0f7f3;color:var(--ink)}
  .flag{background:var(--vert);color:#fff;text-align:center;font-weight:700;font-size:13.5px;padding:8px}
  .hero{background:linear-gradient(180deg,#aee5c4,var(--bg));padding:26px 0 8px}
  .hello{font-size:24px;font-weight:900;margin:0}
  .sub{color:var(--muted);margin:4px 0 0;font-size:14.5px}
  section.block{padding:20px 0}
  h2.title{font-size:20px;margin:0 0 4px;font-weight:900}
  .card{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:20px;box-shadow:var(--shadow);margin-bottom:16px}
  .btn{border:none;cursor:pointer;font:inherit;font-weight:800;border-radius:999px;padding:10px 16px;font-size:14px;transition:.15s}
  .btn.win{background:var(--vert);color:#fff} .btn.win:hover{background:var(--vert-fonce)}
  .btn.ghost{background:#fff;border:1px solid var(--line);color:var(--ink)}
  .btn:disabled{opacity:.5;cursor:default}
  input,select,textarea{font:inherit;padding:10px 12px;border:1px solid var(--line);border-radius:10px;background:#fff;width:100%}
  label{font-weight:700;font-size:13.5px;display:block;margin:0 0 3px}
  .row{display:flex;gap:12px;flex-wrap:wrap}
  .row>div{flex:1;min-width:170px}
  .empty{color:var(--muted);text-align:center;padding:14px}
  .gate{max-width:520px;margin:60px auto;text-align:center;background:#fff;border:1px solid var(--line);border-radius:18px;padding:30px 26px;box-shadow:var(--shadow)}
  .doc{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:12px 14px;border:1px solid var(--line);border-radius:14px;margin-top:8px;flex-wrap:wrap}
  .doc .lab{font-weight:700}
  .doc .hint{color:var(--muted);font-size:13px;font-weight:400}
  .pill{display:inline-block;padding:3px 10px;border-radius:999px;font-size:12.5px;font-weight:800}
  .pill.ok{background:#e2f4ec;color:#0f6b46}.pill.no{background:#fff4e0;color:#b9770e}
  #toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%) translateY(40px);background:var(--ink);color:#fff;padding:12px 20px;border-radius:999px;font-weight:700;box-shadow:var(--shadow-lg);opacity:0;transition:.25s;z-index:99}
  #toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  footer{background:var(--vert-fonce);color:#dff3e9;padding:22px;text-align:center;margin-top:18px;font-size:14px}
  .note{background:#f4f8f6;border:1px solid #d9ece2;border-radius:12px;padding:11px 13px;font-size:13.5px;color:#2c5a45;margin:0 0 12px}
</style>
</head>
<body>
<div class="flag">🎭 Espace intervenant — votre dossier de prestation (identité, justificatifs, convention).</div>
<header>
  <div class="bar">
    <a href="vitrine.html" class="logo"><span class="pine">🍍</span> <span><b>CASE</b> <span>Bois de Nèfles</span></span></a>
    <nav>
      <a href="vitrine.html">← Site public</a>
      <button id="logoutBtn" onclick="ivLogout()" style="display:none">Se déconnecter</button>
    </nav>
  </div>
</header>

<div id="content"><div class="gate"><p class="sub">Chargement…</p></div></div>
<div id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SB_URL='https://dkidtwypclpwznleiqnq.supabase.co';
const SB_KEY='sb_publishable_HDfV-O2ION1Vw9v03aV_Qg_PkiAjLNo';
const BUCKET='dossiers-periscolaire';
const sb=window.supabase.createClient(SB_URL,SB_KEY);
const $=s=>document.querySelector(s);
const ME={session:null,prof:null,asso:null,dossier:null};
function esc(s){return (s==null?'':String(s)).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
function toast(m){const t=$('#toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2600);}
function gate(html){ $('#content').innerHTML='<div class="gate">'+html+'</div>'; }
window.ivLogout=async function(){ try{ await sb.auth.signOut(); }catch(e){} location.href='connexion.html'; };

async function boot(){
  let session=null; try{ session=(await sb.auth.getSession()).data.session; }catch(e){}
  if(!session){ gate('<h2>🔒 Connexion requise</h2><p class="sub">Cet espace est réservé aux intervenants du CASE.</p><p style="margin-top:16px"><a class="btn win" style="text-decoration:none" href="connexion.html">→ Se connecter</a></p>'); return; }
  ME.session=session;
  const {data:prof}=await sb.from('profiles').select('full_name,email,role,statut,asso_id').eq('id',session.user.id).maybeSingle();
  ME.prof=prof||null;
  if(!prof){ gate('<h2>Profil introuvable</h2><p class="sub">Contacte le bureau du CASE.</p>'); return; }
  ME.asso=prof.asso_id||null;
  $('#logoutBtn').style.display='';
  if(prof.statut!=='actif'){ gate('<h2>⏳ Accès en attente</h2><p class="sub">Ton accès doit être validé par le bureau avant d\'ouvrir ton espace.</p>'); return; }
  if(prof.role!=='intervenant'){
    if(prof.role==='adherent'){ location.replace('espace-adherent.html'); return; }
    if(prof.role==='personnel'){ location.replace('espace-personnel.html'); return; }
    if(['president','tresorier','bureau'].includes(prof.role)){ gate('<h2>👋 Bonjour '+esc(prof.full_name||'')+'</h2><p class="sub">Cet espace est celui des intervenants prestataires. La gestion se fait dans Bob.</p><p style="margin-top:16px"><a class="btn win" style="text-decoration:none" href="app.html">→ Aller à la gestion</a></p>'); return; }
    gate('<h2>Accès réservé aux intervenants</h2><p class="sub">Pour toute question, contacte le bureau.</p>'); return;
  }
  await loadDossier();
  render();
}

async function loadDossier(){
  try{
    const {data}=await sb.from('intervenant_dossiers').select('*').eq('user_id',ME.session.user.id).maybeSingle();
    ME.dossier=data||{ structure:'',pers:(ME.prof.full_name||''),domaine:'',siret:'',adresse:'',referent:'',email:(ME.prof.email||''),tel:'',de_path:'',de_nom:'',assur_path:'',assur_nom:'',assur_echeance:'',statut:'brouillon' };
  }catch(e){ ME.dossier={ structure:'',pers:'',domaine:'',siret:'',adresse:'',referent:'',email:'',tel:'',de_path:'',de_nom:'',assur_path:'',assur_nom:'',assur_echeance:'',statut:'brouillon' }; }
}

function docLine(kind, lab, hint){
  const d=ME.dossier; const path=d[kind+'_path']||''; const nom=d[kind+'_nom']||'';
  return '<div class="doc"><div><span class="lab">'+esc(lab)+'</span> '+(path?'<span class="pill ok">✅ déposé</span>':'<span class="pill no">à déposer</span>')
    +'<div class="hint">'+esc(hint)+(path&&nom?' · <b>'+esc(nom)+'</b>':'')+'</div></div>'
    +'<div style="display:flex;gap:6px;flex-wrap:wrap">'
    +(path?'<button class="btn ghost" onclick="ivView(\''+kind+'\')">👁️ Voir</button>':'')
    +'<label class="btn win" style="cursor:pointer">'+(path?'Remplacer':'Déposer')+'<input type="file" accept="image/*,application/pdf" style="display:none" onchange="ivUpload(\''+kind+'\',this)"></label>'
    +'</div></div>';
}

function render(){
  const d=ME.dossier;
  const soumis = d.statut==='soumis';
  $('#content').innerHTML =
   '<div class="hero"><div class="wrap"><p class="hello">Bonjour '+esc(ME.prof.full_name||'')+' 👋</p>'
   +'<p class="sub">Complétez votre dossier de prestation pour le CASE du Bois de Nèfles. '+(soumis?'<b>Dossier soumis au bureau ✅</b> — vous pouvez encore le mettre à jour.':'Une fois prêt, cliquez « Envoyer au bureau ».')+'</p></div></div>'
   +'<div class="wrap"><section class="block">'
   +'<div class="card"><h2 class="title">🏢 Mon identité</h2>'
   +'<div class="note">Ces informations servent à établir la convention de prestation. Le CASE ne verse pas de salaire : votre structure facture la prestation.</div>'
   +'<div class="row"><div><label>Structure (association)</label><input id="f_structure" value="'+esc(d.structure||'')+'" placeholder="Ex. Association Culture Prod"></div>'
   +'<div><label>Intervenant·e</label><input id="f_pers" value="'+esc(d.pers||'')+'" placeholder="Prénom Nom"></div></div>'
   +'<div class="row" style="margin-top:10px"><div><label>N° SIRET</label><input id="f_siret" value="'+esc(d.siret||'')+'" placeholder="14 chiffres"></div>'
   +'<div><label>Domaine</label><input id="f_domaine" value="'+esc(d.domaine||'')+'" placeholder="Danse, musique…"></div></div>'
   +'<div class="row" style="margin-top:10px"><div style="flex:2;min-width:220px"><label>Adresse du siège</label><input id="f_adresse" value="'+esc(d.adresse||'')+'"></div></div>'
   +'<div class="row" style="margin-top:10px"><div><label>Référent</label><input id="f_referent" value="'+esc(d.referent||'')+'" placeholder="Nom du contact"></div>'
   +'<div><label>Email</label><input id="f_email" value="'+esc(d.email||'')+'"></div>'
   +'<div><label>Téléphone</label><input id="f_tel" value="'+esc(d.tel||'')+'"></div></div>'
   +'<div style="margin-top:14px"><button class="btn win" onclick="ivSave(false)">💾 Enregistrer</button></div>'
   +'</div>'
   +'<div class="card"><h2 class="title">📎 Mes justificatifs</h2>'
   +'<div class="note">Deux pièces à déposer : votre <b>diplôme (DE danse ou dispense)</b> et votre <b>attestation d\'assurance RC</b>. '
   +'⚠️ L\'<b>honorabilité</b> (casier B2 / FIJAISV) n\'est <b>pas</b> à téléverser ici — elle est vérifiée directement par le bureau auprès des services de l\'État.</div>'
   +docLine('de','Diplôme (DE danse ou dispense)','Diplôme d\'État, dispense ou équivalence')
   +docLine('assur','Assurance responsabilité civile','Attestation en cours de validité')
   +'<div class="row" style="margin-top:10px"><div style="max-width:220px"><label>Échéance de l\'assurance</label><input id="f_assur_echeance" type="date" value="'+esc(d.assur_echeance||'')+'" onchange="ivSave(true)"></div></div>'
   +'</div>'
   +'<div class="card" style="text-align:center">'
   +'<p class="sub" style="margin:0 0 10px">Quand votre dossier est complet, envoyez-le au bureau pour validation.</p>'
   +'<button class="btn win" style="font-size:15px;padding:12px 22px" onclick="ivSubmit()">📨 '+(soumis?'Mettre à jour ma soumission':'Envoyer au bureau')+'</button>'
   +'</div>'
   +'</section></div>'
   +'<footer>CASE du Bois de Nèfles · Vos données sont privées et réservées au bureau.</footer>';
}

function collect(){
  const g=id=>{ const el=$('#'+id); return el?el.value.trim():''; };
  return { structure:g('f_structure'),pers:g('f_pers'),siret:g('f_siret'),domaine:g('f_domaine'),
    adresse:g('f_adresse'),referent:g('f_referent'),email:g('f_email'),tel:g('f_tel'),
    assur_echeance:(($('#f_assur_echeance')&&$('#f_assur_echeance').value)||null) };
}

async function persist(extra){
  const payload=Object.assign({ user_id:ME.session.user.id, asso_id:ME.asso, updated_at:new Date().toISOString() }, collect(), extra||{});
  if(ME.dossier && ME.dossier.id){
    const {data,error}=await sb.from('intervenant_dossiers').update(payload).eq('id',ME.dossier.id).select().single();
    if(error) throw error; ME.dossier=data; return data;
  } else {
    const {data,error}=await sb.from('intervenant_dossiers').insert(payload).select().single();
    if(error) throw error; ME.dossier=data; return data;
  }
}

window.ivSave=async function(silent){
  try{ await persist(); if(!silent) toast('Enregistré ✅'); }
  catch(e){ console.error(e); toast('Erreur : '+(e.message||'enregistrement')); }
};

window.ivSubmit=async function(){
  try{ await persist({ statut:'soumis', soumis_at:new Date().toISOString() }); toast('Envoyé au bureau ✅'); render(); }
  catch(e){ console.error(e); toast('Erreur : '+(e.message||'envoi')); }
};

window.ivUpload=async function(kind, input){
  const file=input.files&&input.files[0]; if(!file) return;
  if(file.size>10*1024*1024){ toast('Fichier trop lourd (max 10 Mo).'); return; }
  try{
    // s'assurer que la fiche existe (pour rattacher le chemin)
    if(!ME.dossier || !ME.dossier.id){ await persist(); }
    const ext=(file.name.split('.').pop()||'pdf').toLowerCase().replace(/[^a-z0-9]/g,'');
    const path=ME.asso+'/'+ME.session.user.id+'/intervenant/'+kind+'.'+ext;
    const {error:upErr}=await sb.storage.from(BUCKET).upload(path, file, {contentType:file.type||'application/octet-stream', upsert:true});
    if(upErr) throw upErr;
    const patch={}; patch[kind+'_path']=path; patch[kind+'_nom']=file.name;
    await persist(patch);
    toast('Pièce déposée ✅'); render();
  }catch(e){ console.error(e); toast('Erreur upload : '+(e.message||'')); }
};

window.ivView=async function(kind){
  const path=ME.dossier && ME.dossier[kind+'_path']; if(!path) return;
  try{ const {data,error}=await sb.storage.from(BUCKET).createSignedUrl(path,3600); if(error) throw error; window.open(data.signedUrl,'_blank'); }
  catch(e){ console.error(e); toast('Impossible d\'ouvrir la pièce.'); }
};

boot();
</script>
</body>
</html>
