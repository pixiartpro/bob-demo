<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mon espace intervenant — CASE du Bois de Nèfles</title>
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
<link rel="icon" type="image/png" sizes="16x16" href="favicon-16.png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{--vert:#1f9d6b;--vert-fonce:#0f6b46;--jaune:#f4b740;--ananas:#dc8f38;--ink:#1d3a2e;--muted:#5c7468;
        --bg:#fffef7;--card:#fff;--line:#e7efe9;--shadow:0 6px 22px rgba(20,60,40,.10);--shadow-lg:0 16px 44px rgba(20,60,40,.16)}
  *{box-sizing:border-box}
  body{margin:0;font-family:'Inter',-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;color:var(--ink);background:var(--bg);line-height:1.6}
  h1,h2,h3,h4,.logo,.hello,h2.title,.hubname{font-family:'Poppins',sans-serif}
  .wrap{max-width:900px;margin:0 auto;padding:0 20px}
  header{position:sticky;top:0;z-index:50;background:rgba(255,255,255,.93);backdrop-filter:blur(8px);border-bottom:1px solid var(--line)}
  header .bar{display:flex;align-items:center;gap:12px;padding:12px 20px;max-width:900px;margin:0 auto}
  .logo{display:flex;align-items:center;gap:10px;font-weight:900;font-size:17px;text-decoration:none}
  .logo .pine{font-size:28px} .logo b{color:var(--vert)} .logo span{color:var(--ananas)}
  header nav{margin-left:auto;display:flex;gap:8px;align-items:center}
  header nav a,header nav button{padding:8px 12px;border-radius:10px;font-weight:600;font-size:14px;text-decoration:none;color:var(--muted);background:none;border:none;cursor:pointer;font-family:inherit}
  header nav a:hover,header nav button:hover{background:#f0f7f3;color:var(--ink)}
  .flag{background:var(--vert);color:#fff;text-align:center;font-weight:700;font-size:13.5px;padding:8px}
  .hero{background:linear-gradient(180deg,#aee5c4,var(--bg));padding:26px 0 8px}
  .hello{font-size:24px;font-weight:900;margin:0}
  .sub{color:var(--muted);margin:4px 0 0;font-size:14.5px}
  section.block{padding:20px 0}
  h2.title{font-size:20px;margin:0 0 4px;font-weight:900}
  .card{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:20px;box-shadow:var(--shadow);margin-bottom:16px}
  .btn{border:none;cursor:pointer;font:inherit;font-weight:800;border-radius:999px;padding:10px 16px;font-size:14px;transition:.15s}
  .btn.win{background:var(--vert);color:#fff} .btn.win:hover{background:var(--vert-fonce)}
  .btn.ghost{background:#fff;border:1px solid var(--line);color:var(--ink)}
  .btn:disabled{opacity:.5;cursor:default}
  input,select,textarea{font:inherit;padding:10px 12px;border:1px solid var(--line);border-radius:10px;background:#fff;width:100%}
  label{font-weight:700;font-size:13.5px;display:block;margin:0 0 3px}
  .row{display:flex;gap:12px;flex-wrap:wrap}
  .row>div{flex:1;min-width:170px}
  .empty{color:var(--muted);text-align:center;padding:14px}
  .gate{max-width:520px;margin:60px auto;text-align:center;background:#fff;border:1px solid var(--line);border-radius:18px;padding:30px 26px;box-shadow:var(--shadow)}
  .doc{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:12px 14px;border:1px solid var(--line);border-radius:14px;margin-top:8px;flex-wrap:wrap}
  .doc .lab{font-weight:700}
  .doc .hint{color:var(--muted);font-size:13px;font-weight:400}
  .pill{display:inline-block;padding:3px 10px;border-radius:999px;font-size:12.5px;font-weight:800}
  .pill.ok{background:#e2f4ec;color:#0f6b46}.pill.no{background:#fff4e0;color:#b9770e}
  #toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%) translateY(40px);background:var(--ink);color:#fff;padding:12px 20px;border-radius:999px;font-weight:700;box-shadow:var(--shadow-lg);opacity:0;transition:.25s;z-index:99}
  #toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  footer{background:var(--vert-fonce);color:#dff3e9;padding:22px;text-align:center;margin-top:18px;font-size:14px}
  .note{background:#f4f8f6;border:1px solid #d9ece2;border-radius:12px;padding:11px 13px;font-size:13.5px;color:#2c5a45;margin:0 0 12px}
  .chip{display:inline-block;padding:8px 14px;border-radius:999px;border:1px solid var(--line);background:#fff;font-size:13.5px;font-weight:600;cursor:pointer;margin:0 6px 6px 0;font-family:inherit;color:var(--ink);transition:.12s}
  .chip:hover{border-color:var(--vert)}
  .chip.on{background:var(--vert);border-color:var(--vert);color:#fff}
</style>
</head>
<body>
<div class="flag">🎭 Espace intervenant — votre dossier de prestation (identité, justificatifs, convention).</div>
<header>
  <div class="bar">
    <a href="vitrine.html" class="logo"><span class="pine">🍍</span> <span><b>CASE</b> <span>Bois de Nèfles</span></span></a>
    <nav>
      <a href="vitrine.html">← Site public</a>
      <button id="logoutBtn" onclick="ivLogout()" style="display:none">Se déconnecter</button>
    </nav>
  </div>
</header>

<div id="content"><div class="gate"><p class="sub">Chargement…</p></div></div>
<div id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SB_URL='https://dkidtwypclpwznleiqnq.supabase.co';
const SB_KEY='sb_publishable_HDfV-O2ION1Vw9v03aV_Qg_PkiAjLNo';
const BUCKET='dossiers-periscolaire';
const sb=window.supabase.createClient(SB_URL,SB_KEY);
const $=s=>document.querySelector(s);
const ME={session:null,prof:null,asso:null,dossier:null,cours:[]};
const JOURS=['','Lundi','Mardi','Mercredi','Jeudi','Vendredi','Samedi','Dimanche'];
function esc(s){return (s==null?'':String(s)).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
/* Compare deux noms écrits à la main : accents, majuscules et espaces multiples aplatis.
   Le rapprochement se fait sur le nom COMPLET — jamais sur le seul nom de famille (deux Ramin au CASE). */
function normNom(s){ return (s==null?'':String(s)).normalize('NFD').replace(/[\u0300-\u036f]/g,'').toLowerCase().replace(/\s+/g,' ').trim(); }
function manques(){
  const d=ME.dossier||{}; const m=[];
  if(!d.de_path) m.push('votre diplôme (DE danse, dispense ou équivalence)');
  if(!d.assur_path) m.push('votre attestation d\'assurance responsabilité civile');
  else if(!d.assur_echeance) m.push('la date d\'échéance de votre assurance');
  return m;
}
function toast(m){const t=$('#toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2600);}
function gate(html){ $('#content').innerHTML='<div class="gate">'+html+'</div>'; }
window.ivLogout=async function(){ try{ await sb.auth.signOut(); }catch(e){} location.href='connexion.html'; };

async function boot(){
  let session=null; try{ session=(await sb.auth.getSession()).data.session; }catch(e){}
  if(!session){ gate('<h2>🔒 Connexion requise</h2><p class="sub">Cet espace est réservé aux intervenants du CASE.</p><p style="margin-top:16px"><a class="btn win" style="text-decoration:none" href="connexion.html">→ Se connecter</a></p>'); return; }
  ME.session=session;
  const {data:prof}=await sb.from('profiles').select('full_name,email,role,statut,asso_id').eq('id',session.user.id).maybeSingle();
  ME.prof=prof||null;
  if(!prof){ gate('<h2>Profil introuvable</h2><p class="sub">Contacte le bureau du CASE.</p>'); return; }
  ME.asso=prof.asso_id||null;
  $('#logoutBtn').style.display='';
  if(prof.statut!=='actif'){ gate('<h2>⏳ Accès en attente</h2><p class="sub">Ton accès doit être validé par le bureau avant d\'ouvrir ton espace.</p>'); return; }
  if(prof.role!=='intervenant'){
    if(prof.role==='adherent'){ location.replace('espace-adherent.html'); return; }
    if(prof.role==='personnel'){ location.replace('espace-personnel.html'); return; }
    if(['president','tresorier','bureau'].includes(prof.role)){ gate('<h2>👋 Bonjour '+esc(prof.full_name||'')+'</h2><p class="sub">Cet espace est celui des intervenants prestataires. La gestion se fait dans Bob.</p><p style="margin-top:16px"><a class="btn win" style="text-decoration:none" href="app.html">→ Aller à la gestion</a></p>'); return; }
    gate('<h2>Accès réservé aux intervenants</h2><p class="sub">Pour toute question, contacte le bureau.</p>'); return;
  }
  await loadDossier();
  await loadCours();
  render();
}

async function loadDossier(){
  try{
    const {data}=await sb.from('intervenant_dossiers').select('*').eq('user_id',ME.session.user.id).maybeSingle();
    ME.dossier=data||{ structure:'',pers:(ME.prof.full_name||''),domaine:'',siret:'',adresse:'',referent:'',email:(ME.prof.email||''),tel:'',de_path:'',de_nom:'',assur_path:'',assur_nom:'',assur_echeance:'',statut:'brouillon',activites:{} };
  }catch(e){ ME.dossier={ structure:'',pers:'',domaine:'',siret:'',adresse:'',referent:'',email:'',tel:'',de_path:'',de_nom:'',assur_path:'',assur_nom:'',assur_echeance:'',statut:'brouillon',activites:{} }; }
}

/* Ses cours : le planning vit dans `creneaux`, que la RLS laisse lire à toute l'asso mais
   n'autorise à écrire qu'au bureau. On rapproche par le nom de la personne (dossier.pers),
   pas par profiles.full_name qui porte la STRUCTURE (« Culture prod »), pas la personne. */
async function loadCours(){
  ME.cours=[];
  const moi=normNom(ME.dossier && ME.dossier.pers);
  if(!moi) return;
  try{
    const {data,error}=await sb.from('creneaux').select('jour,debut,fin,titre,public_vise,salle,intervenant').eq('actif',true);
    if(error) throw error;
    ME.cours=(data||[]).filter(c=>normNom(c.intervenant)===moi)
      .sort((a,b)=>(a.jour-b.jour)||String(a.debut||'').localeCompare(String(b.debut||'')));
  }catch(e){ console.warn('loadCours',e); ME.cours=[]; }
}

function docLine(kind, lab, hint){
  const d=ME.dossier; const path=d[kind+'_path']||''; const nom=d[kind+'_nom']||'';
  return '<div class="doc"><div><span class="lab">'+esc(lab)+'</span> '+(path?'<span class="pill ok">✅ déposé</span>':'<span class="pill no">à déposer</span>')
    +'<div class="hint">'+esc(hint)+(path&&nom?' · <b>'+esc(nom)+'</b>':'')+'</div></div>'
    +'<div style="display:flex;gap:6px;flex-wrap:wrap">'
    +(path?'<button class="btn ghost" onclick="ivView(\''+kind+'\')">👁️ Voir</button>':'')
    +'<label class="btn win" style="cursor:pointer">'+(path?'Remplacer':'Déposer')+'<input type="file" accept="image/*,application/pdf" style="display:none" onchange="ivUpload(\''+kind+'\',this)"></label>'
    +'</div></div>';
}

function render(){
  const d=ME.dossier;
  const soumis = d.statut==='soumis';
  const m=manques(), complet=!m.length;
  const etat = soumis
    ? (complet ? '<b>Dossier soumis au bureau ✅</b> — il est complet. Vous pouvez encore le mettre à jour.'
               : '<b>⚠️ Dossier envoyé au bureau, mais incomplet.</b> Il a bien été reçu — mais il manque encore '+m.length+' pièce'+(m.length>1?'s':'')+'.')
    : (complet ? 'Votre dossier est complet — cliquez « Envoyer au bureau ».'
               : 'Complétez votre dossier de prestation pour le CASE du Bois de Nèfles.');
  const manqueUI = m.length
    ? '<div class="note" style="background:#fff4e0;border-color:#f0d9a8;color:#8a5a00"><b>⚠️ Il manque encore :</b>'
      +'<ul style="margin:6px 0 0;padding-left:20px">'+m.map(x=>'<li>'+esc(x)+'</li>').join('')+'</ul></div>'
    : '';
  $('#content').innerHTML =
   '<div class="hero"><div class="wrap"><p class="hello">Bonjour '+esc(ME.prof.full_name||'')+' 👋</p>'
   +'<p class="sub">'+etat+'</p></div></div>'
   +'<div class="wrap"><section class="block">'
   +'<div class="card"><h2 class="title">🏢 Mon identité</h2>'
   +'<div class="note">Ces informations servent à établir la convention de prestation. Le CASE ne verse pas de salaire : votre structure facture la prestation.</div>'
   +'<div class="row"><div><label>Structure (association)</label><input id="f_structure" value="'+esc(d.structure||'')+'" placeholder="Ex. Association Culture Prod"></div>'
   +'<div><label>Intervenant·e</label><input id="f_pers" value="'+esc(d.pers||'')+'" placeholder="Prénom Nom"></div></div>'
   +'<div class="row" style="margin-top:10px"><div><label>N° SIRET</label><input id="f_siret" value="'+esc(d.siret||'')+'" placeholder="14 chiffres"></div>'
   +'<div><label>Domaine</label><input id="f_domaine" value="'+esc(d.domaine||'')+'" placeholder="Danse, musique…"></div></div>'
   +'<div class="row" style="margin-top:10px"><div style="flex:2;min-width:220px"><label>Adresse du siège</label><input id="f_adresse" value="'+esc(d.adresse||'')+'"></div></div>'
   +'<div class="row" style="margin-top:10px"><div><label>Référent</label><input id="f_referent" value="'+esc(d.referent||'')+'" placeholder="Nom du contact"></div>'
   +'<div><label>Email</label><input id="f_email" value="'+esc(d.email||'')+'"></div>'
   +'<div><label>Téléphone</label><input id="f_tel" value="'+esc(d.tel||'')+'"></div></div>'
   +'<div style="margin-top:14px"><button class="btn win" onclick="ivSave(false)">💾 Enregistrer</button></div>'
   +'</div>'
   +'<div class="card"><h2 class="title">📎 Mes justificatifs</h2>'
   +'<div class="note">Deux pièces à déposer : votre <b>diplôme (DE danse ou dispense)</b> et votre <b>attestation d\'assurance RC</b>. '
   +'⚠️ L\'<b>honorabilité</b> (casier B2 / FIJAISV) n\'est <b>pas</b> à téléverser ici — elle est vérifiée directement par le bureau auprès des services de l\'État.</div>'
   +docLine('de','Diplôme (DE danse ou dispense)','Diplôme d\'État, dispense ou équivalence')
   +docLine('assur','Assurance responsabilité civile','Attestation en cours de validité')
   +'<div class="row" style="margin-top:10px"><div style="max-width:220px"><label>Échéance de l\'assurance</label><input id="f_assur_echeance" type="date" value="'+esc(d.assur_echeance||'')+'" onchange="ivSave(true)"></div></div>'
   +'</div>'
   +coursUI()
   +'<div class="card" style="text-align:center">'
   +manqueUI
   +'<p class="sub" style="margin:0 0 10px">'+(complet
       ? 'Votre dossier est complet : envoyez-le au bureau pour validation.'
       : 'Vous pouvez l\'envoyer même incomplet — le bureau saura ce qui manque, et vous déposerez le reste plus tard.')+'</p>'
   +'<button class="btn win" style="font-size:15px;padding:12px 22px" onclick="ivSubmit()">📨 '+(soumis?'Mettre à jour ma soumission':'Envoyer au bureau')+'</button>'
   +'</div>'
   +'</section></div>'
   +'<footer>CASE du Bois de Nèfles · Vos données sont privées et réservées au bureau.</footer>';
  /* Filet : on enregistre dès qu'un champ est quitté — le formulaire est long et se remplit au téléphone. */
  ['f_structure','f_pers','f_siret','f_domaine','f_adresse','f_referent','f_email','f_tel'].forEach(function(id){
    const el=$('#'+id); if(el) el.addEventListener('change', ivAuto);
  });
}

/* Un même intitulé peut avoir plusieurs créneaux (Afro dance le jeudi ET le samedi) :
   la fiche se rédige par ACTIVITÉ, pas par créneau. */
function coursGroupes(){
  const m=new Map();
  ME.cours.forEach(function(c){
    const cle=normNom(c.titre||'')||'(sans titre)';
    if(!m.has(cle)) m.set(cle,{cle:cle,titre:(c.titre||'(sans titre)'),creneaux:[]});
    m.get(cle).creneaux.push(c);
  });
  return Array.from(m.values());
}

/* Tout est cliquable : sur un téléphone, 9 activités × 4 pavés de texte ne seraient jamais remplies. */
const CH_QUI=['Enfants','Ados','Adultes','Tous'];
const CH_NIVEAU=['Débutant','Tous niveaux','Confirmé'];
const CH_DEROULE=['Échauffement','Technique','Chorégraphie','Cardio','Étirements','Improvisation','Passage en groupes','Renforcement'];
const CH_TENUE=['Baskets','Pieds nus','Chaussons','Talons','Tenue souple','Bouteille d\'eau'];

/* Bob connaît déjà le public de la plupart des créneaux : on le pré-coche au lieu de le redemander. */
function devinePublic(g){
  const t=normNom(g.creneaux.map(function(c){ return c.public_vise||''; }).join(' '));
  const out=[];
  if(/enfant|eveil|3-5|6-10/.test(t)) out.push('Enfants');
  if(/ado|11-17/.test(t)) out.push('Ados');
  if(/adulte/.test(t)) out.push('Adultes');
  return out;
}
function resumeFiche(f){
  const p=[];
  if(f.qui && f.qui.length) p.push(f.qui.join(', '));
  if(f.niveau) p.push(f.niveau);
  if(f.deroule && f.deroule.length) p.push(f.deroule.join(', '));
  if(f.tenue && f.tenue.length) p.push('à prévoir : '+f.tenue.join(', '));
  return p.join(' · ');
}
function ficheRemplie(f){
  return !!(f && ((f.qui&&f.qui.length) || (f.deroule&&f.deroule.length) || (f.mot&&f.mot.trim())));
}
/* On passe l'INDEX dans le onclick, jamais le libellé : « Bouteille d'eau » casserait l'attribut. */
const CH_TABLES={qui:CH_QUI, niveau:CH_NIVEAU, deroule:CH_DEROULE, tenue:CH_TENUE};
function chipsUI(champ, choix, actifs, multi){
  return choix.map(function(v,k){
    const on = multi ? (actifs||[]).indexOf(v)>=0 : actifs===v;
    return '<button type="button" class="chip'+(on?' on':'')+'" onclick="actChip(\''+champ+'\','+k+')">'+esc(v)+'</button>';
  }).join('');
}

let actOuverte=-1, actDraft=null;
function coursUI(){
  const nom=((ME.dossier&&ME.dossier.pers)||'').trim();
  if(!nom) return '';
  if(!ME.cours.length){
    return '<div class="card"><h2 class="title">🗓️ Mes cours</h2>'
      +'<p class="empty">Aucun cours n\'est inscrit au nom de « '+esc(nom)+' » dans le planning.<br>'
      +'<span class="hint">Si vous animez des cours au CASE, signalez-le au bureau.</span></p></div>';
  }
  const fiches=(ME.dossier&&ME.dossier.activites)||{};
  const groupes=coursGroupes();
  const faites=groupes.filter(function(g){ return ficheRemplie(fiches[g.cle]); }).length;
  /* L'index (un nombre) va dans le onclick, JAMAIS la clé : une clé vient d'un titre saisi
     à la main et casserait l'attribut si elle contenait une apostrophe. */
  const blocs=groupes.map(function(g,i){
    const f=fiches[g.cle]||{};
    const decrit=ficheRemplie(f);
    const ouvert=(actOuverte===i);
    const horaires=g.creneaux.map(function(c){
      return esc(JOURS[c.jour]||'—')+' '+esc(c.debut||'')+'–'+esc(c.fin||'')+(c.public_vise?' <span class="muted">('+esc(c.public_vise)+')</span>':'');
    }).join(' · ');
    let h='<div class="doc" style="display:block">'
      +'<div style="display:flex;justify-content:space-between;gap:10px;flex-wrap:wrap;align-items:flex-start">'
      +'<div><span class="lab">'+esc(g.titre)+'</span> '
      +(decrit?'<span class="pill ok">✅ décrit</span>':'<span class="pill no">à décrire</span>')
      +'<div class="hint">'+horaires+'</div></div>'
      +'<button class="btn ghost" onclick="actEdit('+i+')">'+(ouvert?'Fermer':(decrit?'✏️ Modifier':'✏️ Décrire'))+'</button>'
      +'</div>';
    if(decrit && !ouvert){
      const r=resumeFiche(f);
      if(r) h+='<p class="hint" style="margin:8px 0 0">'+esc(r)+'</p>';
      if(f.mot && f.mot.trim()) h+='<p class="hint" style="margin:4px 0 0;font-style:italic">« '+esc(f.mot)+' »</p>';
    }
    if(ouvert && actDraft){
      h+='<div style="margin-top:10px;border-top:1px solid var(--line);padding-top:12px">'
        +'<label>C\'est pour qui ?</label><div>'+chipsUI('qui',CH_QUI,actDraft.qui,true)+'</div>'
        +'<label style="margin-top:10px">Quel niveau ?</label><div>'+chipsUI('niveau',CH_NIVEAU,actDraft.niveau,false)+'</div>'
        +'<label style="margin-top:10px">On y fait quoi ?</label><div>'+chipsUI('deroule',CH_DEROULE,actDraft.deroule,true)+'</div>'
        +'<label style="margin-top:10px">À prévoir</label><div>'+chipsUI('tenue',CH_TENUE,actDraft.tenue,true)+'</div>'
        +'<label style="margin-top:10px">Un mot à ajouter ? <span class="muted" style="font-weight:400">(facultatif)</span></label>'
        +'<textarea id="a_mot" rows="2" oninput="if(actDraft)actDraft.mot=this.value" placeholder="Seulement si vous voulez préciser quelque chose.">'+esc(actDraft.mot||'')+'</textarea>'
        +'<div style="margin-top:12px"><button class="btn win" onclick="actSave('+i+')">💾 Enregistrer cette fiche</button> '
        +'<button class="btn ghost" onclick="actEdit('+i+')">Annuler</button></div>'
        +'</div>';
    }
    return h+'</div>';
  }).join('');
  return '<div class="card"><h2 class="title">🗓️ Mes cours</h2>'
    +'<div class="note">Vos <b>'+ME.cours.length+' cours</b> tels que le bureau les a inscrits au planning, regroupés en <b>'+groupes.length+' activités</b>. '
    +'<b>Un horaire faux, un cours en trop ou qui manque ?</b> Signalez-le au bureau : c\'est lui qui tient le planning des salles.</div>'
    +'<div class="note" style="background:#fff9e8;border-color:#f0e0a8;color:#7a5c00"><b>✏️ Décrivez chaque activité</b> — <b>'+faites+'/'+groupes.length+'</b> faites. '
    +'<b>Tout se fait en cliquant</b>, il n\'y a rien à écrire : pour qui, quel niveau, ce qu\'on y fait, ce qu\'il faut prévoir. '
    +'Ça servira à présenter vos cours aux familles.<br>'
    +'<b>L\'âge minimum, le diplôme, le certificat médical et l\'assurance ne vous sont pas demandés ici</b> : c\'est au bureau de les établir, ils engagent l\'association.</div>'
    +blocs+'</div>';
}

window.actEdit=function(i){
  if(actOuverte===i){ actOuverte=-1; actDraft=null; render(); return; }
  const g=coursGroupes()[i]; if(!g) return;
  const f=((ME.dossier&&ME.dossier.activites)||{})[g.cle];
  actDraft = f
    ? { qui:(f.qui||[]).slice(), niveau:f.niveau||'', deroule:(f.deroule||[]).slice(), tenue:(f.tenue||[]).slice(), mot:f.mot||'' }
    : { qui:devinePublic(g), niveau:'', deroule:[], tenue:[], mot:'' };  // pré-coché depuis le planning
  actOuverte=i; render();
};
window.actChip=function(champ,k){
  if(!actDraft) return;
  const v=(CH_TABLES[champ]||[])[k]; if(v===undefined) return;
  if(champ==='niveau'){ actDraft.niveau=(actDraft.niveau===v?'':v); }
  else {
    const arr=actDraft[champ]||[]; const j=arr.indexOf(v);
    if(j>=0) arr.splice(j,1); else arr.push(v);
    actDraft[champ]=arr;
  }
  render();
};
window.actSave=async function(i){
  const g=coursGroupes()[i]; if(!g || !actDraft) return;
  if(!ficheRemplie(actDraft)){ toast('Choisissez au moins pour qui, ou ce qu\'on y fait.'); return; }
  const fiches=Object.assign({}, (ME.dossier&&ME.dossier.activites)||{});
  fiches[g.cle]=Object.assign({ titre:g.titre, maj:new Date().toISOString() }, actDraft);
  try{ await persist({activites:fiches}); actOuverte=-1; actDraft=null; toast('Fiche enregistrée ✅'); render(); }
  catch(e){ console.error(e); toast('Erreur : '+(e.message||'enregistrement')); }
};

function collect(){
  const g=id=>{ const el=$('#'+id); return el?el.value.trim():''; };
  return { structure:g('f_structure'),pers:g('f_pers'),siret:g('f_siret'),domaine:g('f_domaine'),
    adresse:g('f_adresse'),referent:g('f_referent'),email:g('f_email'),tel:g('f_tel'),
    assur_echeance:(($('#f_assur_echeance')&&$('#f_assur_echeance').value)||null) };
}

async function persist(extra){
  const payload=Object.assign({ user_id:ME.session.user.id, asso_id:ME.asso, updated_at:new Date().toISOString() }, collect(), extra||{});
  if(ME.dossier && ME.dossier.id){
    const {data,error}=await sb.from('intervenant_dossiers').update(payload).eq('id',ME.dossier.id).select().single();
    if(error) throw error; ME.dossier=data; return data;
  } else {
    const {data,error}=await sb.from('intervenant_dossiers').insert(payload).select().single();
    if(error) throw error; ME.dossier=data; return data;
  }
}

window.ivSave=async function(silent){
  try{ await persist(); if(!silent) toast('Enregistré ✅'); }
  catch(e){ console.error(e); toast('Erreur : '+(e.message||'enregistrement')); }
};

/* Enregistrement automatique dès qu'un champ est quitté. Les appels sont sérialisés : deux champs
   remplis coup sur coup avant que la fiche n'existe créeraient sinon DEUX dossiers au lieu d'un. */
let _chaineSave=Promise.resolve();
window.ivAuto=function(){
  _chaineSave=_chaineSave
    .then(function(){ return persist(); })
    .then(function(){ toast('Enregistré ✅'); })
    .catch(function(e){ console.warn('ivAuto',e); toast('Enregistrement impossible — vérifiez votre connexion.'); });
  return _chaineSave;
};

window.ivSubmit=async function(){
  const m=manques();
  if(m.length && !confirm('Il manque encore :\n\n• '+m.join('\n• ')
      +'\n\nVous pouvez l\'envoyer quand même : le bureau verra ce qui manque et vous déposerez les pièces plus tard.\n\nEnvoyer maintenant ?')) return;
  try{
    await persist({ statut:'soumis', soumis_at:new Date().toISOString() });
    await loadCours();
    toast(m.length ? 'Envoyé — il manque encore '+m.length+' pièce'+(m.length>1?'s':'') : 'Envoyé au bureau ✅ — dossier complet');
    render();
  }
  catch(e){ console.error(e); toast('Erreur : '+(e.message||'envoi')); }
};

window.ivUpload=async function(kind, input){
  const file=input.files&&input.files[0]; if(!file) return;
  if(file.size>10*1024*1024){ toast('Fichier trop lourd (max 10 Mo).'); return; }
  try{
    // s'assurer que la fiche existe (pour rattacher le chemin)
    if(!ME.dossier || !ME.dossier.id){ await persist(); }
    const ext=(file.name.split('.').pop()||'pdf').toLowerCase().replace(/[^a-z0-9]/g,'');
    const path=ME.asso+'/'+ME.session.user.id+'/intervenant/'+kind+'.'+ext;
    const {error:upErr}=await sb.storage.from(BUCKET).upload(path, file, {contentType:file.type||'application/octet-stream', upsert:true});
    if(upErr) throw upErr;
    const patch={}; patch[kind+'_path']=path; patch[kind+'_nom']=file.name;
    await persist(patch);
    toast('Pièce déposée ✅'); render();
  }catch(e){ console.error(e); toast('Erreur upload : '+(e.message||'')); }
};

window.ivView=async function(kind){
  const path=ME.dossier && ME.dossier[kind+'_path']; if(!path) return;
  try{ const {data,error}=await sb.storage.from(BUCKET).createSignedUrl(path,3600); if(error) throw error; window.open(data.signedUrl,'_blank'); }
  catch(e){ console.error(e); toast('Impossible d\'ouvrir la pièce.'); }
};

boot();
</script>
