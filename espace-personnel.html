<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mon espace salarié — CASE du Bois de Nèfles</title>
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
<link rel="icon" type="image/png" sizes="16x16" href="favicon-16.png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<style>
  :root{--vert:#1f9d6b;--vert-fonce:#127a51;--jaune:#f6b400;--ananas:#e8a33d;--ink:#1d3a2e;--muted:#5c7468;
        --bg:#fffef7;--card:#fff;--line:#e7efe9;--shadow:0 6px 22px rgba(20,60,40,.10);--shadow-lg:0 16px 44px rgba(20,60,40,.16)}
  *{box-sizing:border-box}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;color:var(--ink);background:var(--bg);line-height:1.6}
  .wrap{max-width:1000px;margin:0 auto;padding:0 20px}
  header{position:sticky;top:0;z-index:50;background:rgba(255,255,255,.93);backdrop-filter:blur(8px);border-bottom:1px solid var(--line)}
  header .bar{display:flex;align-items:center;gap:12px;padding:12px 20px;max-width:1000px;margin:0 auto}
  .logo{display:flex;align-items:center;gap:10px;font-weight:900;font-size:17px;text-decoration:none}
  .logo .pine{font-size:28px} .logo b{color:var(--vert)} .logo span{color:var(--ananas)}
  header nav{margin-left:auto;display:flex;gap:8px;align-items:center}
  header nav a,header nav button{padding:8px 12px;border-radius:10px;font-weight:600;font-size:14px;text-decoration:none;color:var(--muted);background:none;border:none;cursor:pointer;font-family:inherit}
  header nav a:hover,header nav button:hover{background:#f0f7f3;color:var(--ink)}
  .flag{background:var(--vert);color:#fff;text-align:center;font-weight:700;font-size:13.5px;padding:8px}
  .hero{background:linear-gradient(180deg,#aee5c4,var(--bg));padding:28px 0 8px}
  .hello{font-size:24px;font-weight:900;margin:0}
  .sub{color:var(--muted);margin:4px 0 0;font-size:14.5px}
  section.block{padding:22px 0}
  h2.title{font-size:20px;margin:0 0 10px;font-weight:900}
  .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:14px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:18px;box-shadow:var(--shadow)}
  .kv{display:flex;justify-content:space-between;gap:12px;padding:7px 0;border-bottom:1px dashed var(--line);font-size:14.5px}
  .kv:last-child{border-bottom:none} .kv .k{color:var(--muted)} .kv .v{font-weight:700;text-align:right}
  .solde{display:flex;gap:14px;flex-wrap:wrap}
  .soldebox{flex:1;min-width:150px;background:linear-gradient(135deg,var(--vert),var(--vert-fonce));color:#fff;border-radius:18px;padding:16px 18px;box-shadow:var(--shadow)}
  .soldebox .big{font-size:34px;font-weight:900;line-height:1}
  .soldebox .lab{opacity:.92;font-weight:600;font-size:13.5px}
  .btn{border:none;cursor:pointer;font:inherit;font-weight:800;border-radius:999px;padding:10px 16px;font-size:14px;transition:.15s}
  .btn.win{background:var(--vert);color:#fff} .btn.win:hover{background:var(--vert-fonce)}
  .btn.ghost{background:#fff;border:1px solid var(--line);color:var(--ink)}
  .btn:disabled{opacity:.5;cursor:default}
  input,select,textarea{font:inherit;padding:10px 12px;border:1px solid var(--line);border-radius:10px;background:#fff}
  label{font-weight:700;font-size:13.5px;display:block;margin:0 0 3px}
  .row{display:flex;gap:10px;flex-wrap:wrap}
  .row>div{flex:1;min-width:150px}
  .badge{display:inline-block;padding:3px 10px;border-radius:999px;font-size:12.5px;font-weight:800}
  .b-demande{background:#fff4e0;color:#b9770e}.b-valide{background:#e2f4ec;color:#127a51}.b-refuse{background:#fbe9e7;color:#c0392b}
  .doc{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px dashed var(--line)}
  .doc:last-child{border-bottom:none}
  .empty{color:var(--muted);text-align:center;padding:14px}
  .gate{max-width:520px;margin:60px auto;text-align:center;background:#fff;border:1px solid var(--line);border-radius:18px;padding:30px 26px;box-shadow:var(--shadow)}
  #toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%) translateY(40px);background:var(--ink);color:#fff;padding:12px 20px;border-radius:999px;font-weight:700;box-shadow:var(--shadow-lg);opacity:0;transition:.25s;z-index:99}
  #toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  footer{background:var(--vert-fonce);color:#dff3e9;padding:22px;text-align:center;margin-top:18px;font-size:14px}
  .pre{white-space:pre-wrap;font:inherit;margin:0}
</style>
</head>
<body>
<div class="flag">🧑‍💼 Espace salarié — votre dossier, vos documents, votre planning et vos congés.</div>
<header>
  <div class="bar">
    <a href="vitrine.html" class="logo"><span class="pine">🍍</span> <span><b>CASE</b> <span>Bois de Nèfles</span></span></a>
    <nav>
      <a href="vitrine.html">← Site public</a>
      <button id="logoutBtn" onclick="spLogout()" style="display:none">Se déconnecter</button>
    </nav>
  </div>
</header>

<div id="content"><div class="gate"><p class="muted">Chargement…</p></div></div>
<div id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SB_URL='https://dkidtwypclpwznleiqnq.supabase.co';
const SB_KEY='sb_publishable_HDfV-O2ION1Vw9v03aV_Qg_PkiAjLNo';
const sb=window.supabase.createClient(SB_URL,SB_KEY);
const $=s=>document.querySelector(s);
const ME={session:null,prof:null,fiche:null,conges:[],docs:[],acts:[],ins:[],asso:null};
function esc(s){return (s==null?'':String(s)).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
function toast(m){const t=$('#toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2600);}
function euroDays(n){return (n==null?'0':(Math.round(n*100)/100).toString().replace('.',','));}
function fdate(d){ if(!d) return '—'; try{const x=new Date(d+'T00:00:00');return x.toLocaleDateString('fr-FR',{day:'2-digit',month:'2-digit',year:'numeric'});}catch(e){return d;} }
window.spLogout=async function(){ try{ await sb.auth.signOut(); }catch(e){} location.href='connexion.html'; };

function gate(html){ $('#content').innerHTML='<div class="gate">'+html+'</div>'; }

async function boot(){
  let session=null; try{ session=(await sb.auth.getSession()).data.session; }catch(e){}
  if(!session){ gate('<h2>🔒 Connexion requise</h2><p class="sub">Cet espace est réservé aux salariés du CASE.</p><p style="margin-top:16px"><a class="btn win" style="text-decoration:none" href="connexion.html">→ Se connecter</a></p>'); return; }
  ME.session=session;
  const {data:prof}=await sb.from('profiles').select('full_name,email,role,statut').eq('id',session.user.id).maybeSingle();
  ME.prof=prof||null;
  if(!prof){ gate('<h2>Profil introuvable</h2><p class="sub">Contacte le bureau du CASE.</p>'); return; }
  $('#logoutBtn').style.display='';
  if(prof.statut!=='actif'){ gate('<h2>⏳ Accès en attente</h2><p class="sub">Ton accès doit être validé par le bureau avant d\'ouvrir ton espace.</p>'); return; }
  if(prof.role!=='personnel'){
    if(prof.role==='adherent'){ location.replace('espace-adherent.html'); return; }
    if(['president','tresorier','bureau'].includes(prof.role)){ gate('<h2>👋 Bonjour '+esc(prof.full_name||'')+'</h2><p class="sub">Cet espace est celui des salariés. La gestion du personnel se fait dans Bob (espace bureau).</p><p style="margin-top:16px"><a class="btn win" style="text-decoration:none" href="app.html">→ Aller à la gestion</a></p>'); return; }
    gate('<h2>Accès réservé aux salariés</h2><p class="sub">Pour toute question, contacte le bureau.</p>'); return;
  }
  // rôle personnel : fiche RH facultative (la partie gestion ne dépend pas d'elle)
  const {data:fiche}=await sb.from('personnel').select('*').eq('user_id',session.user.id).maybeSingle();
  ME.fiche=fiche||null;
  const jobs=[loadActs()];
  if(fiche){ jobs.push(loadConges(), loadDocs()); }
  await Promise.all(jobs);
  renderAll();
}

async function loadConges(){
  try{ const {data}=await sb.from('conges').select('*').eq('personnel_id',ME.fiche.id).order('date_debut',{ascending:false}); ME.conges=data||[]; }catch(e){ ME.conges=[]; }
}
async function loadDocs(){
  try{ const {data}=await sb.from('personnel_docs').select('*').eq('personnel_id',ME.fiche.id).eq('partage',true).order('created_at',{ascending:false}); ME.docs=data||[]; }catch(e){ ME.docs=[]; }
}

function renderAll(){
  const f=ME.fiche, p=ME.prof, hasFiche=!!f;
  let html='<div class="hero"><div class="wrap">'
      +'<p class="hello">👋 Bonjour '+esc((f&&f.prenom)||p.full_name||'')+'</p>'
      +'<p class="sub">'+esc((f&&f.poste)||'Salarié·e du CASE')+(f&&f.type_contrat?' · '+esc(f.type_contrat):'')+(f&&f.temps_travail?' · '+esc(f.temps_travail):'')+'</p>'
    +'</div></div>'
    +'<div class="wrap">'
    // ===== MA GESTION (toujours visible) =====
    +'<section class="block"><h2 class="title">🎒 Ma gestion — activités & inscriptions</h2>'
      +'<p class="sub">Crée et gère tes activités (ACM, ateliers…) et les enfants inscrits. <b>Tu prépares</b> ; le bureau publie sur le site public et s\'occupe de l\'argent. Chaque action est enregistrée.</p>'
      +'<div class="card" style="margin-bottom:14px"><h3 id="naTitle" style="margin:0 0 10px">➕ Nouvelle activité</h3>'
        +'<div class="row" style="margin-bottom:8px">'
          +'<div style="flex:2"><label>Nom</label><input id="na_nom" style="width:100%" placeholder="ex. Sortie plage, Atelier cuisine…"></div>'
          +'<div><label>Type</label><select id="na_type" style="width:100%"><option value="activite">🎟️ Activité</option><option value="evenement">📅 Événement</option></select></div>'
          +'<div><label>Places</label><input id="na_cap" type="number" min="0" value="20" style="width:100%"></div>'
        +'</div>'
        +'<div class="row" style="margin-bottom:10px"><div style="flex:1"><label>Programme / description (facultatif)</label><input id="na_prog" style="width:100%" placeholder="ce qu\'on y fait"></div></div>'
        +'<div class="row" style="gap:8px"><button class="btn win" onclick="spSaveAct()">Enregistrer l\'activité</button>'
          +'<button class="btn ghost" onclick="spCancelAct()" id="na_cancel" style="display:none">Annuler la modif</button></div>'
        +'<input type="hidden" id="na_id">'
      +'</div>'
      +'<div id="actList"></div>'
    +'</section>';
  if(hasFiche){
    html+='<section class="block"><div class="grid">'
      +'<div class="card"><h2 class="title">📋 Mon dossier</h2>'
        +kv('Poste',f.poste)+kv('Contrat',f.type_contrat)+kv('Temps de travail',f.temps_travail)
        +kv('Date d\'entrée',fdate(f.date_entree))+kv('Email',f.email||p.email)+kv('Téléphone',f.tel)
        +kv('Adresse',f.adresse)+kv('N° Sécurité sociale',f.num_ss)
        +'<p class="sub" style="margin-top:10px">Une info à corriger ? Préviens le bureau.</p>'
      +'</div>'
      +'<div class="card"><h2 class="title">🗓️ Mon planning</h2>'
        +(f.planning_hebdo?('<p class="pre">'+esc(f.planning_hebdo)+'</p>'):'<p class="empty">Ton planning sera affiché ici dès que le bureau l\'aura renseigné.</p>')
      +'</div>'
    +'</div></section>'
    +'<section class="block"><h2 class="title">🏖️ Mes congés</h2>'
      +'<div class="solde" style="margin-bottom:14px">'
        +'<div class="soldebox"><div class="big">'+euroDays(f.solde_conges)+'</div><div class="lab">jours de congés (CP) restants</div></div>'
        +'<div class="soldebox" style="background:linear-gradient(135deg,#3a8fd0,#2b6cb0)"><div class="big">'+euroDays(f.solde_rtt)+'</div><div class="lab">jours de RTT restants</div></div>'
      +'</div>'
      +'<div class="card" style="margin-bottom:14px"><h3 style="margin:0 0 10px">Demander un congé</h3>'
        +'<div class="row" style="margin-bottom:8px">'
          +'<div><label>Type</label><select id="cg_type" style="width:100%"><option value="CP">Congé payé (CP)</option><option value="RTT">RTT</option><option value="Sans solde">Sans solde</option><option value="Maladie">Maladie</option><option value="Autre">Autre</option></select></div>'
          +'<div><label>Du</label><input id="cg_debut" type="date" style="width:100%" oninput="cgDays()"></div>'
          +'<div><label>Au</label><input id="cg_fin" type="date" style="width:100%" oninput="cgDays()"></div>'
        +'</div>'
        +'<div class="row" style="margin-bottom:8px"><div style="flex:2"><label>Motif (facultatif)</label><input id="cg_motif" style="width:100%" placeholder="ex. vacances famille"></div>'
          +'<div><label>Jours</label><input id="cg_jours" type="number" min="0" step="0.5" style="width:100%" placeholder="0"></div></div>'
        +'<div class="row" style="margin-bottom:10px"><div style="flex:1"><label>📎 Justificatif (facultatif — arrêt maladie, convocation…)</label><input id="cg_file" type="file" accept="image/*,application/pdf" style="width:100%"></div></div>'
        +'<button class="btn win" onclick="cgSend()">📨 Envoyer ma demande</button>'
      +'</div>'
      +'<div class="card"><h3 style="margin:0 0 6px">Mes demandes</h3><div id="cgList"></div></div>'
    +'</section>'
    +'<section class="block"><h2 class="title">📎 Mes documents</h2>'
      +'<p class="sub">Les documents que le bureau partage avec vous (fiches de paie, attestations, contrat…).</p>'
      +'<div class="card"><div id="docList"></div></div>'
    +'</section>';
  } else {
    html+='<section class="block"><div class="card"><p class="empty">📋 Ton dossier RH (planning, congés, documents) apparaîtra ici dès que le bureau aura créé ta fiche salarié.</p></div></section>';
  }
  html+='</div><footer>CASE du Bois de Nèfles · Espace salarié · données hébergées en France (RGPD)</footer>';
  $('#content').innerHTML=html;
  renderActs();
  if(hasFiche){ renderConges(); renderDocs(); }
}

async function loadActs(){
  try{
    const pr=await sb.from('profiles').select('asso_id').eq('id',ME.session.user.id).maybeSingle();
    ME.asso=pr.data?pr.data.asso_id:null;
    const [ra,ri]=await Promise.all([
      sb.from('activites').select('*').order('created_at',{ascending:true}),
      sb.from('inscriptions_activite').select('*').order('created_at',{ascending:true})
    ]);
    ME.acts=ra.data||[]; ME.ins=ri.data||[];
  }catch(e){ ME.acts=[]; ME.ins=[]; }
}
function renderActs(){
  const box=$('#actList'); if(!box) return;
  if(!ME.acts.length){ box.innerHTML='<p class="empty">Aucune activité pour l\'instant. Crée la première ci-dessus 👆</p>'; return; }
  const byA={}; ME.ins.forEach(i=>{ (byA[i.activite_id]=byA[i.activite_id]||[]).push(i); });
  box.innerHTML=ME.acts.map(a=>{
    const list=byA[a.id]||[];
    const editable=!a.publie; // une activité publiée par le bureau n'est pas modifiable par le salarié
    const insRows=list.length
      ? '<table style="width:100%;margin-top:8px;font-size:14px"><tbody>'+list.map(i=>'<tr><td style="padding:4px 0">👧 '+esc(i.nom||'(sans nom)')+(i.responsable?' <span class="sub">· '+esc(i.responsable)+'</span>':'')+'</td><td style="text-align:right">'+(editable?'<button class="btn ghost" style="padding:3px 9px;font-size:12px" onclick="spDelIns(\''+i.id+'\')">retirer</button>':'')+'</td></tr>').join('')+'</tbody></table>'
      : '<p class="empty" style="margin:6px 0 0">Personne d\'inscrit.</p>';
    return '<div class="card" style="margin-bottom:12px;border-left:4px solid '+(a.publie?'#1f9d6b':'#e8a33d')+'">'
      +'<div style="display:flex;justify-content:space-between;align-items:flex-start;gap:10px">'
        +'<div><b style="font-size:16px">'+esc((a.emoji?a.emoji+' ':'')+(a.nom||'(sans nom)'))+'</b> '
          +'<span class="badge '+(a.publie?'b-valide':'b-demande')+'">'+(a.publie?'🌍 publié (bureau)':'🔒 brouillon')+'</span><br>'
          +'<span class="sub">'+(a.type==='evenement'?'📅 Événement':'🎟️ Activité')+' · '+list.length+' inscrit'+(list.length>1?'s':'')+(a.capacite?' / '+a.capacite+' places':'')+'</span>'
          +(a.programme?'<div class="sub" style="margin-top:4px">'+esc(a.programme)+'</div>':'')
        +'</div>'
        +(editable?'<button class="btn ghost" style="padding:5px 10px;font-size:13px;white-space:nowrap" onclick="spEditAct(\''+a.id+'\')">✏️ Modifier</button>':'')
      +'</div>'
      +insRows
      +(editable
        ? '<div class="row" style="margin-top:8px;gap:6px"><div style="flex:2"><input id="ni_'+a.id+'" placeholder="Nom de l\'enfant à inscrire" style="width:100%" onkeydown="if(event.key===\'Enter\')spAddIns(\''+a.id+'\')"></div><button class="btn win" style="white-space:nowrap" onclick="spAddIns(\''+a.id+'\')">+ inscrire</button></div>'
        : '<p class="sub" style="margin-top:8px">Activité publiée — gérée par le bureau.</p>')
    +'</div>';
  }).join('');
}
window.spCancelAct=function(){ $('#na_id').value=''; $('#na_nom').value=''; $('#na_prog').value=''; $('#na_cap').value='20'; $('#na_type').value='activite'; $('#naTitle').textContent='➕ Nouvelle activité'; $('#na_cancel').style.display='none'; };
window.spSaveAct=async function(){
  const nom=$('#na_nom').value.trim(); if(!nom){ toast('Indique le nom'); return; }
  const id=$('#na_id').value;
  let r;
  if(id){
    r=await sb.from('activites').update({ nom, type:$('#na_type').value, capacite:Math.max(0,parseInt($('#na_cap').value,10)||0), programme:$('#na_prog').value.trim() }).eq('id',id);
  } else {
    r=await sb.from('activites').insert({ asso_id:ME.asso, nom, type:$('#na_type').value, capacite:Math.max(0,parseInt($('#na_cap').value,10)||0), programme:$('#na_prog').value.trim(), publie:false, statut:'ouvert' });
  }
  if(r.error){ toast('Erreur : '+r.error.message); return; }
  spCancelAct();
  await loadActs(); renderActs(); toast(id?'✅ Activité modifiée':'✅ Activité créée');
};
window.spEditAct=function(id){
  const a=ME.acts.find(x=>x.id===id); if(!a) return;
  $('#na_id').value=a.id; $('#na_nom').value=a.nom||''; $('#na_type').value=a.type||'activite'; $('#na_cap').value=a.capacite||0; $('#na_prog').value=a.programme||'';
  $('#naTitle').textContent='✏️ Modifier l\'activité'; $('#na_cancel').style.display='';
  $('#na_nom').scrollIntoView({behavior:'smooth',block:'center'}); $('#na_nom').focus();
};
window.spAddIns=async function(aid){
  const el=document.getElementById('ni_'+aid); const nom=el?el.value.trim():''; if(!nom){ toast('Indique un nom'); return; }
  const {error}=await sb.from('inscriptions_activite').insert({ asso_id:ME.asso, activite_id:aid, nom, statut:'valide' });
  if(error){ toast('Erreur : '+error.message); return; }
  if(el) el.value=''; await loadActs(); renderActs(); toast('✅ '+nom+' inscrit·e');
};
window.spDelIns=async function(id){
  if(!confirm('Retirer cette inscription ?')) return;
  const {error}=await sb.from('inscriptions_activite').delete().eq('id',id);
  if(error){ toast('Erreur : '+error.message); return; }
  await loadActs(); renderActs(); toast('Inscription retirée');
};
function kv(k,v){ return '<div class="kv"><span class="k">'+esc(k)+'</span><span class="v">'+(v?esc(v):'—')+'</span></div>'; }

function renderConges(){
  const box=$('#cgList'); if(!box) return;
  if(!ME.conges.length){ box.innerHTML='<p class="empty">Aucune demande pour l\'instant.</p>'; return; }
  box.innerHTML=ME.conges.map(c=>{
    const b={demande:'b-demande',valide:'b-valide',refuse:'b-refuse'}[c.statut]||'b-demande';
    const lab={demande:'En attente',valide:'Validé',refuse:'Refusé'}[c.statut]||c.statut;
    return '<div class="kv"><span class="k">'+esc(c.type||'CP')+' · '+fdate(c.date_debut)+' → '+fdate(c.date_fin)+(c.nb_jours?' · '+euroDays(c.nb_jours)+' j':'')
      +(c.piece&&c.piece.path?' · <button class="reset" style="font-size:12.5px;padding:0" onclick="cgVoirPiece(\''+c.id+'\')">📎 justificatif</button>':'')
      +(c.note_bureau?'<br><span style="font-size:12.5px">📝 '+esc(c.note_bureau)+'</span>':'')+'</span>'
      +'<span class="v"><span class="badge '+b+'">'+lab+'</span>'+(c.statut==='demande'?' <button class="btn ghost" style="padding:4px 10px;font-size:12px" onclick="cgDelete(\''+c.id+'\')">Annuler</button>':'')+'</span></div>';
  }).join('');
}
function renderDocs(){
  const box=$('#docList'); if(!box) return;
  if(!ME.docs.length){ box.innerHTML='<p class="empty">Aucun document partagé pour l\'instant.</p>'; return; }
  box.innerHTML=ME.docs.map(d=>'<div class="doc"><span style="font-size:22px">📄</span><div style="flex:1"><div style="font-weight:700">'+esc(d.name||'Document')+'</div>'+(d.categorie?'<div class="sub" style="margin:0">'+esc(d.categorie)+'</div>':'')+'</div><button class="btn ghost" onclick="docOpen(\''+d.id+'\')">Ouvrir</button></div>').join('');
}
window.docOpen=async function(id){
  const d=ME.docs.find(x=>x.id===id); if(!d) return;
  try{ const {data,error}=await sb.storage.from('personnel-docs').createSignedUrl(d.path,3600); if(error||!data){ toast('Document indisponible'); return; } window.open(data.signedUrl,'_blank'); }
  catch(e){ toast('Document indisponible'); }
};
window.cgDays=function(){
  const a=$('#cg_debut').value, b=$('#cg_fin').value; if(!a||!b) return;
  try{ const d1=new Date(a+'T00:00:00'), d2=new Date(b+'T00:00:00'); if(d2>=d1){ const n=Math.round((d2-d1)/86400000)+1; if(!$('#cg_jours').value||$('#cg_jours').dataset.auto!=='0') { $('#cg_jours').value=n; $('#cg_jours').dataset.auto='1'; } } }catch(e){}
};
window.cgSend=async function(){
  const type=$('#cg_type').value, debut=$('#cg_debut').value, fin=$('#cg_fin').value, motif=$('#cg_motif').value.trim();
  const jours=parseFloat($('#cg_jours').value)||0;
  if(!debut||!fin){ toast('Indique les dates'); return; }
  if(new Date(fin)<new Date(debut)){ toast('La date de fin est avant le début'); return; }
  let piece={};
  const fEl=document.getElementById('cg_file'); const file=fEl&&fEl.files&&fEl.files[0];
  if(file && ME.fiche){
    const ext=(file.name.split('.').pop()||'bin').toLowerCase();
    const path=ME.fiche.asso_id+'/'+ME.fiche.id+'/conges/'+Date.now().toString(36)+Math.random().toString(36).slice(2,7)+'.'+ext;
    const up=await sb.storage.from('personnel-docs').upload(path,file,{contentType:file.type||'application/octet-stream'});
    if(up.error){ toast('Erreur fichier : '+up.error.message); return; }
    piece={path,name:file.name};
  }
  const {error}=await sb.from('conges').insert({type,date_debut:debut,date_fin:fin,nb_jours:jours,motif,piece});
  if(error){ toast('Erreur : '+error.message); return; }
  $('#cg_motif').value=''; $('#cg_jours').value=''; $('#cg_jours').dataset.auto=''; if(fEl) fEl.value='';
  await loadConges(); renderConges(); toast('✅ Demande envoyée au bureau');
};
window.cgVoirPiece=async function(id){
  const c=ME.conges.find(x=>x.id===id); if(!c||!c.piece||!c.piece.path) return;
  try{ const {data,error}=await sb.storage.from('personnel-docs').createSignedUrl(c.piece.path,3600); if(error||!data){ toast('Indisponible'); return; } window.open(data.signedUrl,'_blank'); }
  catch(e){ toast('Indisponible'); }
};
window.cgDelete=async function(id){
  if(!confirm('Annuler cette demande ?')) return;
  const {error}=await sb.from('conges').delete().eq('id',id);
  if(error){ toast('Erreur : '+error.message); return; }
  await loadConges(); renderConges(); toast('Demande annulée');
};

boot();
</script>
