<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mon espace salarié — CASE du Bois de Nèfles</title>
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
<link rel="icon" type="image/png" sizes="16x16" href="favicon-16.png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{--vert:#1f9d6b;--vert-fonce:#0f6b46;--jaune:#f4b740;--ananas:#dc8f38;--ink:#1d3a2e;--muted:#5c7468;
        --bg:#fffef7;--card:#fff;--line:#e7efe9;--shadow:0 6px 22px rgba(20,60,40,.10);--shadow-lg:0 16px 44px rgba(20,60,40,.16)}
  *{box-sizing:border-box}
  body{margin:0;font-family:'Inter',-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;color:var(--ink);background:var(--bg);line-height:1.6}
  h1,h2,h3,h4,.logo,.hello,h2.title,.hubname,.backttl,.soldebox .big{font-family:'Poppins',sans-serif}
  .reset{background:none;border:none;color:var(--vert);cursor:pointer;font:inherit;padding:0}
  .wrap{max-width:1000px;margin:0 auto;padding:0 20px}
  header{position:sticky;top:0;z-index:50;background:rgba(255,255,255,.93);backdrop-filter:blur(8px);border-bottom:1px solid var(--line)}
  header .bar{display:flex;align-items:center;gap:12px;padding:12px 20px;max-width:1000px;margin:0 auto}
  .logo{display:flex;align-items:center;gap:10px;font-weight:900;font-size:17px;text-decoration:none}
  .logo .pine{font-size:28px} .logo b{color:var(--vert)} .logo span{color:var(--ananas)}
  header nav{margin-left:auto;display:flex;gap:8px;align-items:center}
  header nav a,header nav button{padding:8px 12px;border-radius:10px;font-weight:600;font-size:14px;text-decoration:none;color:var(--muted);background:none;border:none;cursor:pointer;font-family:inherit}
  header nav a:hover,header nav button:hover{background:#f0f7f3;color:var(--ink)}
  .flag{background:var(--vert);color:#fff;text-align:center;font-weight:700;font-size:13.5px;padding:8px}
  .hero{background:linear-gradient(180deg,#aee5c4,var(--bg));padding:28px 0 8px}
  .hello{font-size:24px;font-weight:900;margin:0}
  .sub{color:var(--muted);margin:4px 0 0;font-size:14.5px}
  section.block{padding:22px 0}
  h2.title{font-size:20px;margin:0 0 10px;font-weight:900}
  .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:14px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:18px;box-shadow:var(--shadow)}
  .kv{display:flex;justify-content:space-between;gap:12px;padding:7px 0;border-bottom:1px dashed var(--line);font-size:14.5px}
  .kv:last-child{border-bottom:none} .kv .k{color:var(--muted)} .kv .v{font-weight:700;text-align:right}
  .solde{display:flex;gap:14px;flex-wrap:wrap}
  .soldebox{flex:1;min-width:150px;background:linear-gradient(135deg,var(--vert),var(--vert-fonce));color:#fff;border-radius:18px;padding:16px 18px;box-shadow:var(--shadow)}
  .soldebox .big{font-size:34px;font-weight:900;line-height:1}
  .soldebox .lab{opacity:.92;font-weight:600;font-size:13.5px}
  .btn{border:none;cursor:pointer;font:inherit;font-weight:800;border-radius:999px;padding:10px 16px;font-size:14px;transition:.15s}
  .btn.win{background:var(--vert);color:#fff} .btn.win:hover{background:var(--vert-fonce)}
  .btn.ghost{background:#fff;border:1px solid var(--line);color:var(--ink)}
  .btn:disabled{opacity:.5;cursor:default}
  input,select,textarea{font:inherit;padding:10px 12px;border:1px solid var(--line);border-radius:10px;background:#fff}
  label{font-weight:700;font-size:13.5px;display:block;margin:0 0 3px}
  .row{display:flex;gap:10px;flex-wrap:wrap}
  .row>div{flex:1;min-width:150px}
  .badge{display:inline-block;padding:3px 10px;border-radius:999px;font-size:12.5px;font-weight:800}
  .b-demande{background:#fff4e0;color:#b9770e}.b-valide{background:#e2f4ec;color:#0f6b46}.b-refuse{background:#fbe9e7;color:#c0392b}
  .doc{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px dashed var(--line)}
  .doc:last-child{border-bottom:none}
  /* Checklist « Dossiers familles » (rempli / manquant) */
  .ckgrid{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px}
  .ck{display:inline-flex;align-items:center;gap:4px;padding:4px 11px;border-radius:999px;font-size:12.5px;font-weight:700;background:#e2f4ec;color:#0f6b46;border:1px solid #cdeadd}
  .ck.off{background:#fff4e0;color:#9a6a0a;border-color:#f3e3bd}
  .ck .val{font-weight:600}
  .empty{color:var(--muted);text-align:center;padding:14px}
  .gate{max-width:520px;margin:60px auto;text-align:center;background:#fff;border:1px solid var(--line);border-radius:18px;padding:30px 26px;box-shadow:var(--shadow)}
  #toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%) translateY(40px);background:var(--ink);color:#fff;padding:12px 20px;border-radius:999px;font-weight:700;box-shadow:var(--shadow-lg);opacity:0;transition:.25s;z-index:99}
  #toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  footer{background:var(--vert-fonce);color:#dff3e9;padding:22px;text-align:center;margin-top:18px;font-size:14px}
  .pre{white-space:pre-wrap;font:inherit;margin:0}
  /* Hub de blocs (accueil salarié) */
  .hubgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:16px;margin-top:6px}
  .hubcard{text-align:left;cursor:pointer;background:var(--card);border:1px solid var(--line);border-radius:22px;padding:22px 22px 18px;box-shadow:var(--shadow);font-family:inherit;color:inherit;display:flex;flex-direction:column;gap:6px;min-height:160px;transition:transform .16s,box-shadow .16s,border-color .16s}
  .hubcard:hover{transform:translateY(-3px);box-shadow:var(--shadow-lg);border-color:var(--vert)}
  .hubcard:active{transform:translateY(-1px)}
  .hubico{font-size:40px;line-height:1}
  .hubname{font-size:20px;font-weight:900;color:var(--ink)}
  .hubsub{color:var(--muted);font-size:14.5px;flex:1}
  .hubgo{font-weight:800;color:var(--vert);font-size:14.5px}
  .backbar{display:flex;align-items:center;gap:12px;padding:16px 0 2px}
  .backttl{font-weight:900;font-size:17px}
  /* Visionneuse de documents (aperçu intégré, sans téléchargement) */
  #docViewer{display:none;position:fixed;inset:0;z-index:200}
  .dv-backdrop{position:absolute;inset:0;background:rgba(20,40,30,.55)}
  .dv-card{position:relative;max-width:920px;margin:3vh auto;width:calc(100% - 28px);background:#fff;border-radius:18px;box-shadow:var(--shadow-lg);overflow:hidden;max-height:94vh;display:flex;flex-direction:column}
  .dv-head{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:11px 14px;border-bottom:1px solid var(--line)}
  .dv-name{font-weight:800;font-size:15px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .dv-body{padding:12px;overflow:auto;background:#f4f8f5}
  /* Bienvenue + boîte à commentaires (💡) */
  #welcomeBar{display:flex;gap:12px;align-items:center;justify-content:center;flex-wrap:wrap;background:linear-gradient(90deg,#fff7e6,#eafaf1);border-bottom:1px solid var(--line);padding:11px 16px;font-size:14px;color:var(--ink)}
  #welcomeBar button{flex:0 0 auto;background:var(--vert);color:#fff;border:none;border-radius:999px;padding:7px 14px;font-weight:800;cursor:pointer;font-family:inherit}
  #fbFab{position:fixed;right:20px;bottom:20px;z-index:150;width:56px;height:56px;border-radius:50%;border:none;cursor:pointer;background:var(--jaune);color:#5b4300;font-size:24px;box-shadow:var(--shadow-lg)}
  #fbPanel{position:fixed;right:20px;bottom:86px;z-index:150;width:340px;max-width:calc(100vw - 28px);height:440px;max-height:72vh;background:#fff;border:1px solid var(--line);border-radius:18px;box-shadow:var(--shadow-lg);display:none;flex-direction:column;overflow:hidden}
  #fbPanel.open{display:flex}
  #fbHead{background:var(--jaune);color:#5b4300;padding:12px 14px;font-weight:800;display:flex;align-items:center;justify-content:space-between}
  #fbHead button{background:rgba(0,0,0,.12);border:none;color:#5b4300;cursor:pointer;border-radius:8px;font-size:15px;width:28px;height:28px}
  #fbList{flex:1;overflow:auto;padding:8px;background:#fffdf6}
  .fbItem{background:#fff;border:1px solid var(--line);border-radius:12px;padding:9px 11px;margin:7px 4px}
  .fbMeta{font-size:11px;color:#8a7d56;font-weight:700;margin-bottom:3px}
  #fbBar{padding:8px;border-top:1px solid var(--line)}
  #fbBar textarea{width:100%;font:inherit;padding:9px 11px;border:1px solid var(--line);border-radius:10px;resize:none;height:60px}
  #fbBar button{margin-top:6px;width:100%;background:var(--jaune);color:#5b4300;border:none;border-radius:10px;padding:10px;font-weight:800;cursor:pointer}
</style>
</head>
<body>
<div class="flag">🧑‍💼 Espace salarié — votre dossier, vos documents, votre planning et vos congés.</div>
<header>
  <div class="bar">
    <a href="vitrine.html" class="logo"><span class="pine">🍍</span> <span><b>CASE</b> <span>Bois de Nèfles</span></span></a>
    <nav>
      <a href="vitrine.html">← Site public</a>
      <a href="https://mail.hostinger.com" target="_blank" rel="noopener">📧 Ma boîte mail</a>
      <button id="logoutBtn" onclick="spLogout()" style="display:none">Se déconnecter</button>
    </nav>
  </div>
</header>

<div id="content"><div class="gate"><p class="sub">Chargement…</p></div></div>
<div id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SB_URL='https://dkidtwypclpwznleiqnq.supabase.co';
const SB_KEY='sb_publishable_HDfV-O2ION1Vw9v03aV_Qg_PkiAjLNo';
const sb=window.supabase.createClient(SB_URL,SB_KEY);
const $=s=>document.querySelector(s);
const ME={session:null,prof:null,fiche:null,conges:[],docs:[],acts:[],ins:[],asso:null,protos:[],albums:[],photos:[],kids:[],famKids:[],famDoss:[],famOnlyMiss:false,famEdit:null};
function esc(s){return (s==null?'':String(s)).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
function toast(m){const t=$('#toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2600);}
function euroDays(n){return (n==null?'0':(Math.round(n*100)/100).toString().replace('.',','));}
function fdate(d){ if(!d) return '—'; try{const x=new Date(d+'T00:00:00');return x.toLocaleDateString('fr-FR',{day:'2-digit',month:'2-digit',year:'numeric'});}catch(e){return d;} }
window.spLogout=async function(){ try{ await sb.auth.signOut(); }catch(e){} location.href='connexion.html'; };

function gate(html){ $('#content').innerHTML='<div class="gate">'+html+'</div>'; }

async function boot(){
  let session=null; try{ session=(await sb.auth.getSession()).data.session; }catch(e){}
  if(!session){ gate('<h2>🔒 Connexion requise</h2><p class="sub">Cet espace est réservé aux salariés du CASE.</p><p style="margin-top:16px"><a class="btn win" style="text-decoration:none" href="connexion.html">→ Se connecter</a></p>'); return; }
  ME.session=session;
  const {data:prof}=await sb.from('profiles').select('full_name,email,role,statut').eq('id',session.user.id).maybeSingle();
  ME.prof=prof||null;
  if(!prof){ gate('<h2>Profil introuvable</h2><p class="sub">Contacte le bureau du CASE.</p>'); return; }
  $('#logoutBtn').style.display='';
  if(prof.statut!=='actif'){ gate('<h2>⏳ Accès en attente</h2><p class="sub">Ton accès doit être validé par le bureau avant d\'ouvrir ton espace.</p>'); return; }
  if(prof.role!=='personnel'){
    if(prof.role==='adherent'){ location.replace('espace-adherent.html'); return; }
    if(['president','tresorier','bureau'].includes(prof.role)){ gate('<h2>👋 Bonjour '+esc(prof.full_name||'')+'</h2><p class="sub">Cet espace est celui des salariés. La gestion du personnel se fait dans Bob (espace bureau).</p><p style="margin-top:16px"><a class="btn win" style="text-decoration:none" href="app.html">→ Aller à la gestion</a></p>'); return; }
    gate('<h2>Accès réservé aux salariés</h2><p class="sub">Pour toute question, contacte le bureau.</p>'); return;
  }
  // rôle personnel : fiche RH facultative (la partie gestion ne dépend pas d'elle)
  const {data:fiche}=await sb.from('personnel').select('*').eq('user_id',session.user.id).maybeSingle();
  ME.fiche=fiche||null;
  const jobs=[loadActs(), loadProtocoles(), loadPhotos(), loadFamilles()];
  if(fiche){ jobs.push(loadConges(), loadDocs()); }
  await Promise.all(jobs);
  renderAll();
  mountFeedback();
}

async function loadConges(){
  try{ const {data}=await sb.from('conges').select('*').eq('personnel_id',ME.fiche.id).order('date_debut',{ascending:false}); ME.conges=data||[]; }catch(e){ ME.conges=[]; }
}
async function loadDocs(){
  try{ const {data}=await sb.from('personnel_docs').select('*').eq('personnel_id',ME.fiche.id).eq('partage',true).order('created_at',{ascending:false}); ME.docs=data||[]; }catch(e){ ME.docs=[]; }
}
async function loadProtocoles(){
  // Canal étroit : seulement les protocoles VALIDÉS publiés par le bureau (RLS filtre par asso)
  try{ const {data}=await sb.from('protocoles_publies').select('*').order('categorie',{ascending:true}); ME.protos=data||[]; }catch(e){ ME.protos=[]; }
}

function renderAll(){
  if(!ME.view) ME.view='hub';
  const f=ME.fiche, p=ME.prof;
  const html='<div class="hero"><div class="wrap">'
      +'<p class="hello">👋 Bonjour '+esc((f&&f.prenom)||p.full_name||'')+'</p>'
      +'<p class="sub">'+esc((f&&f.poste)||'Salarié·e du CASE')+(f&&f.type_contrat?' · '+esc(f.type_contrat):'')+(f&&f.temps_travail?' · '+esc(f.temps_travail):'')+'</p>'
    +'</div></div>'
    +'<div class="wrap"><div id="viewport"></div>'
    +'<footer>CASE du Bois de Nèfles · Espace salarié · données hébergées en France (RGPD)</footer></div>';
  $('#content').innerHTML=html;
  renderView();
}
window.spView=function(v){ ME.view=v; renderView(); try{window.scrollTo({top:0,behavior:'smooth'});}catch(e){} };
function renderView(){
  const vp=$('#viewport'); if(!vp) return;
  if(ME.view==='activites'){ vp.innerHTML=backBar('🎒 Mes activités')+activitesHTML(); renderActs(); }
  else if(ME.view==='familles'){ vp.innerHTML=backBar('👨‍👩‍👧 Dossiers familles')+famillesHTML(); renderFamilles(); }
  else if(ME.view==='photos'){ vp.innerHTML=backBar('📸 Photos du jour')+photosHTML(); renderAlbums(); }
  else if(ME.view==='rh'){ vp.innerHTML=backBar('🧑‍💼 Mon RH')+rhHTML(); if(ME.fiche){ renderConges(); renderDocs(); } }
  else if(ME.view==='procedures'){ vp.innerHTML=backBar('📋 Procédures du CASE')+proceduresHTML(); }
  else { vp.innerHTML=hubHTML(); }
}
function backBar(t){ return '<div class="backbar"><button class="btn ghost" onclick="spView(\'hub\')">← Retour</button><span class="backttl">'+esc(t)+'</span></div>'; }

// ===== Accueil : choisir un bloc =====
function hubHTML(){
  const f=ME.fiche, hasFiche=!!f;
  const nbAct=ME.acts.length, nbIns=ME.ins.length;
  const actSub=nbAct?(nbAct+' activité'+(nbAct>1?'s':'')+' · '+nbIns+' inscrit'+(nbIns>1?'s':'')):'Crée ta première activité';
  let rhSub, rhBadge='';
  if(hasFiche){
    const att=ME.conges.filter(c=>c.statut==='demande').length;
    rhSub='Dossier, planning, congés & documents';
    if(att) rhBadge=' <span class="badge b-demande">'+att+' en attente</span>';
  } else { rhSub='Activé par le bureau dès qu\'il crée ta fiche'; }
  const nbAlb=ME.albums.length;
  const phSub=nbAlb?(nbAlb+' album'+(nbAlb>1?'s':'')+' partagé'+(nbAlb>1?'s':'')+' avec les familles'):'Partage les photos de la journée aux familles';
  return '<section class="block"><h2 class="title">Que veux-tu faire ?</h2>'
    +'<p class="sub" style="margin:-4px 0 14px">Choisis un espace — tu pourras toujours revenir ici.</p>'
    +'<div class="hubgrid">'
      +'<button class="hubcard" onclick="spView(\'activites\')"><div class="hubico">🎒</div>'
        +'<div class="hubname">Mes activités</div><div class="hubsub">'+esc(actSub)+'</div><div class="hubgo">Entrer →</div></button>'
      +'<button class="hubcard" onclick="spView(\'photos\')"><div class="hubico">📸</div>'
        +'<div class="hubname">Photos du jour</div><div class="hubsub">'+esc(phSub)+'</div><div class="hubgo">Entrer →</div></button>'
      +'<button class="hubcard" onclick="spView(\'familles\')"><div class="hubico">👨‍👩‍👧</div>'
        +'<div class="hubname">Dossiers familles'+famHubBadge()+'</div><div class="hubsub">'+esc(famHubSub())+'</div><div class="hubgo">Entrer →</div></button>'
      +'<button class="hubcard" onclick="spView(\'rh\')"><div class="hubico">🧑‍💼</div>'
        +'<div class="hubname">Mon RH'+rhBadge+'</div><div class="hubsub">'+esc(rhSub)+'</div><div class="hubgo">Entrer →</div></button>'
      +(ME.protos.length?('<button class="hubcard" onclick="spView(\'procedures\')"><div class="hubico">📋</div>'
        +'<div class="hubname">Procédures du CASE</div><div class="hubsub">'+ME.protos.length+' procédure'+(ME.protos.length>1?'s':'')+' à connaître (caisse, sécurité…)</div><div class="hubgo">Entrer →</div></button>'):'')
      +'<a class="hubcard" href="https://mail.hostinger.com" target="_blank" rel="noopener" style="text-decoration:none"><div class="hubico">📧</div>'
        +'<div class="hubname">Ma boîte mail</div><div class="hubsub">Ta messagerie pro @casebdn.re — s\'ouvre dans un nouvel onglet</div><div class="hubgo">Ouvrir ↗</div></a>'
    +'</div></section>';
}

// ===== Bloc Procédures (protocoles validés, lecture seule, accordéon) =====
function proceduresHTML(){
  if(!ME.protos.length) return '<section class="block"><div class="card"><p class="empty">Aucune procédure publiée pour l\'instant.</p></div></section>';
  return '<section class="block">'
    +'<p class="sub">Les procédures validées par le bureau, à appliquer dans ton travail. Touche un titre pour le déplier.</p>'
    +'<div class="card" style="padding:4px 10px">'+ME.protos.map((p,i)=>{
      const last=i===ME.protos.length-1;
      const cat=p.categorie?' <span class="badge b-valide">'+esc(p.categorie)+'</span>':'';
      return '<div'+(last?'':' style="border-bottom:1px dashed var(--line)"')+'>'
        +'<button onclick="spProtoToggle('+i+')" style="width:100%;text-align:left;background:none;border:none;cursor:pointer;font:inherit;padding:14px 4px;display:flex;align-items:center;justify-content:space-between;gap:10px">'
          +'<span style="font-weight:800;font-size:15.5px">'+esc(p.titre)+cat+'</span>'
          +'<span id="pchev'+i+'" style="color:var(--muted);flex:0 0 auto">▾</span></button>'
        +'<div id="pbody'+i+'" style="display:none;padding:0 4px 16px"><p class="pre">'+esc(p.contenu||'')+'</p>'
          +(p.url?'<a class="btn ghost" style="text-decoration:none;display:inline-block;margin-top:8px" href="'+esc(p.url)+'" target="_blank" rel="noopener">Ouvrir le document ↗</a>':'')
        +'</div></div>';
    }).join('')+'</div></section>';
}
window.spProtoToggle=function(i){ const b=document.getElementById('pbody'+i), c=document.getElementById('pchev'+i); if(!b)return; const open=b.style.display==='none'; b.style.display=open?'block':'none'; if(c)c.textContent=open?'▴':'▾'; };

// ===== Bloc Activités (gestion + inscriptions) =====
function activitesHTML(){
  return '<section class="block">'
      +'<p class="sub">Crée et gère tes activités (ACM, VEPI, ateliers…) et les enfants inscrits. <b>Tu prépares</b> ; le bureau publie sur le site public et s\'occupe de l\'argent. Chaque action est enregistrée.</p>'
      +'<div class="card" style="margin-bottom:14px"><h3 id="naTitle" style="margin:0 0 10px">➕ Nouvelle activité</h3>'
        +'<div class="row" style="margin-bottom:8px">'
          +'<div style="flex:2"><label>Nom</label><input id="na_nom" style="width:100%" placeholder="ex. Sortie plage, Atelier cuisine…"></div>'
          +'<div><label>Type</label><select id="na_type" style="width:100%"><option value="activite">🎟️ Activité</option><option value="evenement">📅 Événement</option></select></div>'
          +'<div><label>Places</label><input id="na_cap" type="number" min="0" value="20" style="width:100%"></div>'
        +'</div>'
        +'<div class="row" style="margin-bottom:10px"><div style="flex:1"><label>Programme / description (facultatif)</label><input id="na_prog" style="width:100%" placeholder="ce qu\'on y fait"></div></div>'
        +'<div class="row" style="gap:8px"><button class="btn win" onclick="spSaveAct()">Enregistrer l\'activité</button>'
          +'<button class="btn ghost" onclick="spCancelAct()" id="na_cancel" style="display:none">Annuler la modif</button></div>'
        +'<input type="hidden" id="na_id">'
      +'</div>'
      +'<div id="actList"></div>'
    +'</section>';
}

async function phCompress(file){
  try{
    const img=await new Promise(function(ok,ko){ const u=URL.createObjectURL(file); const i=new Image(); i.onload=function(){ok(i)}; i.onerror=ko; i.src=u; });
    const MAX=1600; let w=img.naturalWidth,h=img.naturalHeight;
    if(Math.max(w,h)>MAX){ const r=MAX/Math.max(w,h); w=Math.round(w*r); h=Math.round(h*r); }
    const c=document.createElement('canvas'); c.width=w; c.height=h;
    c.getContext('2d').drawImage(img,0,0,w,h);
    const blob=await new Promise(function(ok){ c.toBlob(ok,'image/jpeg',0.82); });
    return blob||file;
  }catch(e){ return file; }
}
async function phUploadFiles(albumId, files, progSel){
  const prog=document.querySelector(progSel); let ok=0;
  for(let i=0;i<files.length;i++){
    if(prog) prog.textContent='Envoi de la photo '+(i+1)+' / '+files.length+'…';
    const blob=await phCompress(files[i]);
    const path=ME.asso+'/'+albumId+'/'+Date.now().toString(36)+Math.random().toString(36).slice(2,7)+'.jpg';
    const up=await sb.storage.from('photos-activites').upload(path,blob,{contentType:'image/jpeg'});
    if(up.error){ if(prog) prog.textContent='⚠️ Photo '+(i+1)+' : '+up.error.message; continue; }
    const ins=await sb.from('photos_album').insert({asso_id:ME.asso, album_id:albumId, chemin:path});
    if(!ins.error) ok++;
  }
  if(prog) prog.textContent='';
  return ok;
}

const FAM_PIECES=[{k:'caf',lab:'Attestation CAF'},{k:'impots',lab:'Avis d\'imposition'},{k:'domicile',lab:'Justificatif de domicile'},{k:'assurance',lab:'Attestation d\'assurance'},{k:'vaccin',lab:'Vaccins à jour'},{k:'livret',lab:'Livret de famille'}];
function famFilled(s){ return !!(s&&String(s).trim()); }
function famNorm(s){ return String(s||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/\s+/g,' ').trim(); }
async function loadFamilles(){
  try{
    const [rk,rd]=await Promise.all([
      sb.from('enfants').select('id,nom,prenom,naissance,classe,ecole,allergies,sante,autorises,droit_image').order('nom',{ascending:true}),
      sb.from('inscriptions_periscolaire').select('id,asso_id,user_id,annee,foyer,email,tel,enfants,pieces,statut,besoin_aide,note_bureau,updated_at').order('updated_at',{ascending:false})
    ]);
    ME.famKids=(rk.data||[]).map(function(k){ return { id:k.id, nom:k.nom||'', prenom:k.prenom||'', naissance:k.naissance||'', classe:k.classe||'', ecole:k.ecole||'',
      allergies:String(k.allergies||'').trim(), sante:String(k.sante||'').trim(), autorises:String(k.autorises||'').trim(), droit_image:k.droit_image }; });
    ME.famDoss=rd.data||[];
  }catch(e){ ME.famKids=[]; ME.famDoss=[]; }
}
function famDossierFor(k){
  for(let i=0;i<ME.famDoss.length;i++){
    const d=ME.famDoss[i]; const arr=Array.isArray(d.enfants)?d.enfants:[];
    const it=arr.find(function(e){ return (e.enfant_id&&e.enfant_id===k.id) || (famNorm(e.nom)===famNorm(k.nom) && famNorm(e.prenom)===famNorm(k.prenom) && famNorm(k.nom+k.prenom)!==''); });
    if(it) return {d:d,it:it};
  }
  return null;
}
function famBilan(k){
  const checks=[
    {lab:'Date de naissance', ok:!!k.naissance, val:k.naissance?fdate(k.naissance):''},
    {lab:'École', ok:famFilled(k.ecole), val:k.ecole},
    {lab:'Classe', ok:famFilled(k.classe), val:k.classe, opt:true},
    {lab:'Allergies', ok:famFilled(k.allergies)},
    {lab:'Infos santé', ok:famFilled(k.sante), opt:true},
    {lab:'Personnes autorisées', ok:famFilled(k.autorises)},
    {lab:'Droit à l\'image', ok:k.droit_image!=null, val:(k.droit_image==null?'':(k.droit_image?'autorisé':'refusé'))}
  ];
  const dj=famDossierFor(k);
  let missPieces=[];
  if(dj){ const pieces=(dj.d.pieces&&typeof dj.d.pieces==='object')?dj.d.pieces:{}; missPieces=FAM_PIECES.filter(function(p){ return !(pieces[p.k]&&pieces[p.k].path); }); }
  const manque=checks.filter(function(c){ return !c.ok&&!c.opt; }).length + ((dj&&(dj.d.statut==='incomplet'||missPieces.length))?1:0);
  return {checks:checks, dj:dj, missPieces:missPieces, manque:manque, aide:!!(dj&&dj.d.besoin_aide)};
}
function famMissCount(){ let n=0; ME.famKids.forEach(function(k){ if(famBilan(k).manque>0) n++; }); return n; }
function famHubSub(){
  const n=ME.famKids.length;
  if(!n) return 'Vois ce qui manque dans les fiches pour aider les parents à compléter';
  const m=famMissCount();
  return n+' enfant'+(n>1?'s':'')+' · '+(m?(m+' fiche'+(m>1?'s':'')+' à compléter'):'tout est complet ✅');
}
function famHubBadge(){
  let a=0; ME.famKids.forEach(function(k){ if(famBilan(k).aide) a++; });
  return a?' <span class="badge b-demande">🙋 '+a+'</span>':'';
}
function famillesHTML(){
  return '<section class="block">'
    +'<p class="sub">Pour accompagner les parents : ce qui est <b>rempli ✓</b> et ce qui <b>manque ⚠️</b>, enfant par enfant. Tu peux <b>📎 déposer les pièces à la place de la famille</b> (scanne ou photographie ses papiers) et <b>✏️ compléter la fiche avec le parent</b> à côté de toi. Le bureau garde la <b>validation</b> et tout ce qui touche à l\'argent ; chaque geste est enregistré au journal. 🔒 Les allergies, infos santé et personnes autorisées s\'affichent pour le <b>terrain</b> (PAI, qui récupère l\'enfant…) : ces infos restent confidentielles, elles ne sortent pas de Bob.</p>'
    +'<div class="card" style="margin-bottom:14px"><div class="row">'
      +'<div style="flex:2"><input id="fam_q" placeholder="🔎 Chercher un enfant…" style="width:100%" oninput="renderFamilles()"></div>'
      +'<div style="flex:0 0 auto"><button class="btn '+(ME.famOnlyMiss?'win':'ghost')+'" id="fam_miss_btn" onclick="famToggleMiss()">⚠️ Seulement à compléter</button></div>'
    +'</div><div id="famStats" class="sub" style="margin:8px 0 0"></div></div>'
    +'<div id="famList"></div>'
  +'</section>';
}
window.famToggleMiss=function(){ ME.famOnlyMiss=!ME.famOnlyMiss; const b=$('#fam_miss_btn'); if(b) b.className='btn '+(ME.famOnlyMiss?'win':'ghost'); renderFamilles(); };
function renderFamilles(){
  const box=$('#famList'); if(!box) return;
  const st=$('#famStats');
  if(!ME.famKids.length){ if(st) st.textContent=''; box.innerHTML='<div class="card"><p class="empty">Aucune fiche enfant pour l\'instant. Elles apparaissent quand les familles créent leur compte (ou quand le bureau les saisit).</p></div>'; return; }
  const q=famNorm((($('#fam_q')||{}).value)||'');
  const rows=ME.famKids.map(function(k){ return {k:k,b:famBilan(k)}; });
  const nMiss=rows.filter(function(r){ return r.b.manque>0; }).length;
  const nAide=rows.filter(function(r){ return r.b.aide; }).length;
  if(st) st.innerHTML='🧒 <b>'+rows.length+'</b> enfant'+(rows.length>1?'s':'')+' · ✅ '+(rows.length-nMiss)+' complet'+((rows.length-nMiss)>1?'s':'')+' · ⚠️ '+nMiss+' à compléter'+(nAide?' · 🙋 '+nAide+' demande'+(nAide>1?'s':'')+' d\'aide':'');
  let list=rows;
  if(q) list=list.filter(function(r){ return famNorm(r.k.prenom+' '+r.k.nom).indexOf(q)>=0; });
  if(ME.famOnlyMiss) list=list.filter(function(r){ return r.b.manque>0; });
  list.sort(function(a,b){ return ((b.b.aide?1:0)-(a.b.aide?1:0)) || ((b.b.manque?1:0)-(a.b.manque?1:0)) || famNorm(a.k.prenom+' '+a.k.nom).localeCompare(famNorm(b.k.prenom+' '+b.k.nom)); });
  if(!list.length){ box.innerHTML='<div class="card"><p class="empty">'+(ME.famOnlyMiss&&!q?'🎉 Rien à compléter — toutes les fiches sont au complet.':'Aucun enfant ne correspond à la recherche.')+'</p></div>'; return; }
  box.innerHTML=list.map(function(r){ return famCardHtml(r.k,r.b); }).join('');
}
function famCardHtml(k,b){
  const name=esc(((k.prenom||'')+' '+(k.nom||'')).trim()||'(sans nom)');
  const chips=b.checks.map(function(c){
    return '<span class="ck '+(c.ok?'on':'off')+'">'+(c.ok?'✓':'⚠️')+' '+esc(c.lab)
      +(c.ok&&c.val?' <span class="val">· '+esc(c.val)+'</span>':'')
      +((!c.ok&&c.opt)?' <span class="val">(facultatif)</span>':'')
    +'</span>';
  }).join('');
  const iv=[];
  if(k.allergies) iv.push('🤧 <b>Allergies :</b> '+esc(k.allergies));
  if(k.sante) iv.push('🩺 <b>Infos santé :</b> '+esc(k.sante));
  if(k.autorises) iv.push('👥 <b>Autorisés à récupérer l\'enfant :</b> '+esc(k.autorises));
  const infos=iv.length?'<div style="margin-top:10px;font-size:14px;background:#f4f8f5;border:1px solid var(--line);border-radius:12px;padding:10px 12px;line-height:1.7">'+iv.join('<br>')+'</div>':'';
  let doss='';
  if(b.dj){
    const d=b.dj.d, it=b.dj.it||{};
    const SL={brouillon:['📝 Brouillon — pas encore déposé','b-demande'],depose:['📨 Déposé — en attente du bureau','b-demande'],incomplet:['⚠️ Incomplet','b-refuse'],valide:['✅ Validé','b-valide'],refuse:['✖️ Refusé','b-refuse']};
    const s=SL[d.statut]||[esc(d.statut||'—'),'b-demande'];
    const acc=[(it.matin?'🌅 matin':''),(it.soir?'🌇 soir':'')].filter(Boolean).join(' + ');
    const pc=FAM_PIECES.length-b.missPieces.length;
    const pieces=(d.pieces&&typeof d.pieces==='object')?d.pieces:{};
    const pieceRows=FAM_PIECES.map(function(p){
      const got=pieces[p.k]&&pieces[p.k].path;
      return '<div style="display:flex;align-items:center;gap:8px;padding:4px 0;border-bottom:1px dashed var(--line);font-size:13.5px">'
        +'<span style="flex:1;font-weight:600;color:'+(got?'#0f6b46':'#9a6a0a')+'">'+(got?'✓ ':'⚠️ ')+esc(p.lab)
          +(got&&pieces[p.k].par==='accueil'?' <span style="font-weight:400;font-size:11.5px;color:var(--muted)">(déposée par l\'accueil)</span>':'')+'</span>'
        +(got
          ?'<button class="btn ghost" style="padding:3px 10px;font-size:12px" onclick="famVoirPiece(\''+d.id+'\',\''+p.k+'\')">👁️ Voir</button>'
          :'<label class="btn win" style="padding:3px 10px;font-size:12px;cursor:pointer">📎 Déposer<input type="file" accept="image/*,application/pdf" style="display:none" onchange="famUpload(\''+d.id+'\',\''+p.k+'\',this)"></label>')
      +'</div>';
    }).join('');
    doss='<div style="margin-top:10px;padding-top:10px;border-top:1px dashed var(--line);font-size:14px">'
      +'<b>🎒 Dossier périscolaire'+(d.annee?' '+esc(d.annee):'')+'</b> <span class="badge '+s[1]+'">'+s[0]+'</span>'+(acc?' · '+acc:'')+' <span class="sub">· pièces : <b>'+pc+'/'+FAM_PIECES.length+'</b></span>'
      +((d.statut==='incomplet'&&d.note_bureau)?'<div style="margin-top:4px;background:#fbe9e7;border:1px solid #f3c4ba;color:#b23a23;border-radius:10px;padding:6px 10px;font-size:13px">📝 Bureau : '+esc(d.note_bureau)+'</div>':'')
      +'<div style="margin-top:4px">'+pieceRows+'</div>'
      +'<div id="famup_'+d.id+'" class="sub" style="margin:4px 0 0"></div>'
      +(b.aide?'<div style="margin-top:4px;font-weight:700;color:#b9770e">🙋 La famille a coché « j\'ai besoin d\'aide » — c\'est le moment de l\'accompagner.</div>':'')
      +((d.foyer||d.email||d.tel)?'<div class="sub" style="margin:4px 0 0">👪 '+esc(d.foyer||'Famille')+(d.email?' · 📧 '+esc(d.email):'')+(d.tel?' · 📞 '+esc(d.tel):'')+'</div>':'')
    +'</div>';
  } else {
    doss='<div class="sub" style="margin-top:10px;padding-top:10px;border-top:1px dashed var(--line)">🎒 Pas de dossier périscolaire — normal si la famille n\'utilise pas la garderie. (Pour en créer un : la famille se connecte à son espace, avec toi à côté si besoin.)</div>';
  }
  const okAll=b.manque===0;
  const editing=ME.famEdit===k.id;
  return '<div class="card" style="margin-bottom:12px;border-left:4px solid '+(okAll?'#1f9d6b':'#dc8f38')+'">'
    +'<div style="display:flex;justify-content:space-between;gap:10px;flex-wrap:wrap;align-items:center">'
      +'<b style="font-size:16px">🧒 '+name+'</b>'
      +'<span>'+(b.aide?'<span class="badge b-demande">🙋 aide demandée</span> ':'')+'<span class="badge '+(okAll?'b-valide':'b-demande')+'">'+(okAll?'✅ complet':'⚠️ à compléter')+'</span>'
      +(editing?'':' <button class="btn ghost" style="padding:4px 10px;font-size:12px" onclick="famEditKid(\''+k.id+'\')">✏️ Compléter</button>')+'</span>'
    +'</div>'
    +(editing?famEditFormHtml(k):('<div class="ckgrid">'+chips+'</div>'+infos))
    +doss
    +famActsHtml(k)
  +'</div>';
}
// Activités où l'enfant est inscrit (ACM Ados, VEPI, danse, événements…) via inscriptions_activite.
function famChildInscriptions(k){
  const kn=famNorm((k.prenom||'')+' '+(k.nom||'')), kn2=famNorm((k.nom||'')+' '+(k.prenom||''));
  return ME.ins.filter(function(i){
    if(i.enfant_id) return i.enfant_id===k.id;
    const inm=famNorm(i.nom||''); return inm && (inm===kn||inm===kn2);
  }).map(function(i){ return {ins:i, act:ME.acts.find(function(a){return a.id===i.activite_id;})}; })
   .filter(function(x){ return x.act; });
}
// Profils de pièces par activité : accueil de mineurs (ACM/VEPI = 6 docs CASF),
// sport (certif médical + assurance), aucun (pièces libres). Catégorie = champ LIBRE → on
// classe par bloc + mots-clés « sport ». Fichiers dans le bucket privé dossiers-activites.
const ACT_DOC_PROFILES={
  mineurs:{label:'Accueil de mineurs', pieces:[{k:'caf',lab:'Attestation CAF'},{k:'impots',lab:'Avis d\'imposition'},{k:'domicile',lab:'Justificatif de domicile'},{k:'assurance',lab:'Attestation d\'assurance'},{k:'vaccin',lab:'Vaccins à jour'},{k:'livret',lab:'Livret de famille'}]},
  sport:{label:'Activité sportive', pieces:[{k:'certif_medical',lab:'Certificat médical'},{k:'assurance',lab:'Attestation d\'assurance'}]},
  aucun:{label:'', pieces:[]}
};
function actDocProfile(a){
  if(actBlockKey(a)==='peri') return 'mineurs';
  const t=famNorm((a.nom||'')+' '+(a.categorie||''));
  if(/(zumba|danse|sport|fitness|gym|muscu|yoga|fit|foot|basket|hand|athl|natation|boxe|karate|judo|rugby|volley|tennis|course|running|cardio|pilates|renfo|capoeira|hip *hop|moring)/.test(t)) return 'sport';
  return 'aucun';
}
function famPieceRow(insId, key, lab, got){
  return '<div style="display:flex;align-items:center;gap:8px;padding:3px 0;font-size:13.5px">'
    +'<span style="flex:1;font-weight:600;color:'+(got?'#0f6b46':'#9a6a0a')+'">'+(got?'✓ ':'⚠️ ')+esc(lab)
      +(got&&got.par==='accueil'?' <span style="font-weight:400;font-size:11px;color:var(--muted)">(par l\'accueil)</span>':'')+'</span>'
    +(got
      ?'<button class="btn ghost" style="padding:2px 9px;font-size:12px" onclick="famActVoir(\''+insId+'\',\''+key+'\')">👁️ Voir</button>'
      :'<label class="btn win" style="padding:2px 9px;font-size:12px;cursor:pointer">📎 Déposer<input type="file" accept="image/*,application/pdf" style="display:none" onchange="famActUpload(\''+insId+'\',\''+key+'\',this)"></label>')
  +'</div>';
}
function famActsHtml(k){
  const mine=famChildInscriptions(k);
  let rows;
  if(mine.length){
    rows=mine.map(function(x){
      const a=x.act, i=x.ins;
      const nm=(a.emoji?a.emoji+' ':'🎟️ ')+(a.nom||'Activité');
      const cat=actBlockLabelShort(a);
      const st=i.statut?('<span class="badge '+(i.statut==='valide'?'b-valide':(i.statut==='refuse'?'b-refuse':'b-demande'))+'">'+esc(i.statut)+'</span>'):'';
      const prof=actDocProfile(a);
      const pieces=(i.pieces&&typeof i.pieces==='object')?i.pieces:{};
      let docs='';
      if(prof==='aucun'){
        const attached=Object.keys(pieces).filter(function(kk){ return pieces[kk]&&pieces[kk].path; });
        docs=(attached.length?attached.map(function(kk){ return '<div style="display:flex;align-items:center;gap:8px;padding:3px 0;font-size:13.5px"><span style="flex:1">📎 '+esc(pieces[kk].name||'Document')+'</span><button class="btn ghost" style="padding:2px 9px;font-size:12px" onclick="famActVoir(\''+i.id+'\',\''+kk+'\')">👁️ Voir</button> <button class="btn ghost" style="padding:2px 8px;font-size:12px" onclick="famActDelDoc(\''+i.id+'\',\''+kk+'\')">✕</button></div>'; }).join(''):'')
          +'<label class="btn ghost" style="padding:3px 10px;font-size:12px;cursor:pointer;display:inline-block;margin-top:4px">📎 Ajouter un document<input type="file" accept="image/*,application/pdf" style="display:none" onchange="famActUpload(\''+i.id+'\',\'\',this)"></label>';
      } else {
        const list=ACT_DOC_PROFILES[prof].pieces;
        const done=list.filter(function(p){ return pieces[p.k]&&pieces[p.k].path; }).length;
        docs='<div class="sub" style="margin:2px 0 2px">📋 Pièces ('+ACT_DOC_PROFILES[prof].label+') — <b>'+done+'/'+list.length+'</b></div>'
          +list.map(function(p){ return famPieceRow(i.id, p.k, p.lab, (pieces[p.k]&&pieces[p.k].path)?pieces[p.k]:null); }).join('');
      }
      return '<div style="padding:6px 0;border-bottom:1px dashed var(--line)">'
        +'<div style="display:flex;align-items:center;gap:8px;font-size:14px">'
          +'<span style="flex:1"><b>'+esc(nm)+'</b>'+(cat?' <span class="sub">· '+esc(cat)+'</span>':'')+'</span>'
          +st+' <button class="btn ghost" style="padding:3px 9px;font-size:12px" onclick="famDelIns(\''+i.id+'\')">retirer</button>'
        +'</div>'
        +'<div style="margin-top:2px">'+docs+'</div>'
        +'<div id="factup_'+i.id+'" class="sub" style="margin:2px 0 0"></div>'
      +'</div>';
    }).join('');
  } else { rows='<p class="empty" style="margin:4px 0 0">Pas encore inscrit à une activité.</p>'; }
  const opts=ME.acts.filter(function(a){ return a.statut!=='archive'; })
    .map(function(a){ return '<option value="'+a.id+'">'+esc((a.emoji?a.emoji+' ':'')+(a.nom||'')+' — '+actBlockLabelShort(a))+'</option>'; }).join('');
  const adder='<div class="row" style="margin-top:8px;gap:6px"><div style="flex:2"><select id="faddact_'+k.id+'" style="width:100%"><option value="">➕ Inscrire à une activité…</option>'+opts+'</select></div><button class="btn win" style="white-space:nowrap" onclick="famAddToAct(\''+k.id+'\')">Inscrire</button></div>';
  return '<div style="margin-top:10px;padding-top:10px;border-top:1px dashed var(--line);font-size:14px"><b>🎟️ Activités</b>'
    +'<div style="margin-top:4px">'+rows+'</div>'+adder+'</div>';
}
window.famAddToAct=async function(kid){
  const sel=document.getElementById('faddact_'+kid); const aid=sel?sel.value:''; if(!aid){ toast('Choisis une activité'); return; }
  const k=ME.famKids.find(function(x){ return x.id===kid; }); if(!k) return;
  if(ME.ins.find(function(i){ return i.activite_id===aid && i.enfant_id===kid; })){ toast('Déjà inscrit à cette activité'); return; }
  const nom=((k.prenom||'')+' '+(k.nom||'')).trim();
  const {error}=await sb.from('inscriptions_activite').insert({asso_id:ME.asso, activite_id:aid, nom:nom, enfant_id:kid, statut:'valide'});
  if(error){ toast('Erreur : '+error.message); return; }
  await loadActs(); renderFamilles(); toast('✅ '+nom+' inscrit·e');
};
window.famDelIns=async function(id){
  if(!confirm('Retirer cette inscription à l\'activité ?')) return;
  const {error}=await sb.from('inscriptions_activite').delete().eq('id',id);
  if(error){ toast('Erreur : '+error.message); return; }
  await loadActs(); renderFamilles(); toast('Inscription retirée');
};
window.famActUpload=async function(insId, key, input){
  const ins=ME.ins.find(function(x){ return x.id===insId; }); if(!ins) return;
  const file=input.files&&input.files[0]; if(!file) return;
  if(file.size>10*1024*1024){ toast('Fichier trop lourd (max 10 Mo)'); input.value=''; return; }
  const info=$('#factup_'+insId); if(info) info.textContent='📤 Envoi de « '+(file.name||'pièce')+' »…';
  try{
    const m=(file.name||'').match(/\.[a-z0-9]+$/i); const ext=m?m[0].toLowerCase():'';
    const useKey=key||('doc_'+Date.now().toString(36)+Math.random().toString(36).slice(2,5));
    const path=(ins.asso_id||ME.asso)+'/'+insId+'/'+useKey+'-'+Date.now().toString(36)+Math.random().toString(36).slice(2,6)+ext;
    const up=await sb.storage.from('dossiers-activites').upload(path,file,{contentType:file.type||'application/octet-stream',upsert:false});
    if(up.error) throw up.error;
    const pieces=Object.assign({}, (ins.pieces&&typeof ins.pieces==='object')?ins.pieces:{});
    pieces[useKey]={path:path, name:file.name||'', par:'accueil'};
    const r=await sb.from('inscriptions_activite').update({pieces:pieces}).eq('id',insId);
    if(r.error) throw r.error;
    ins.pieces=pieces; if(info) info.textContent='';
    renderFamilles(); toast('✅ Document déposé');
  }catch(e){ if(info) info.textContent=''; toast('Échec du dépôt : '+(e.message||e)); }
};
window.famActVoir=async function(insId, key){
  const ins=ME.ins.find(function(x){ return x.id===insId; }); if(!ins) return;
  const got=ins.pieces&&ins.pieces[key]; if(!got||!got.path) return;
  try{ const {data,error}=await sb.storage.from('dossiers-activites').createSignedUrl(got.path,3600); if(error||!data){ toast('Pièce indisponible'); return; } spShowDoc(data.signedUrl,(got.name||key)); }
  catch(e){ toast('Pièce indisponible'); }
};
window.famActDelDoc=async function(insId, key){
  if(!confirm('Retirer ce document ?')) return;
  const ins=ME.ins.find(function(x){ return x.id===insId; }); if(!ins) return;
  const got=ins.pieces&&ins.pieces[key];
  try{ if(got&&got.path) await sb.storage.from('dossiers-activites').remove([got.path]); }catch(e){}
  const pieces=Object.assign({}, (ins.pieces&&typeof ins.pieces==='object')?ins.pieces:{}); delete pieces[key];
  const r=await sb.from('inscriptions_activite').update({pieces:pieces}).eq('id',insId);
  if(r.error){ toast('Erreur : '+r.error.message); return; }
  ins.pieces=pieces; renderFamilles(); toast('Document retiré');
};
function famEditFormHtml(k){
  const classes=['','TPS','PS','MS','GS','CP','CE1','CE2','CM1','CM2','Autre'];
  const opts=classes.map(function(c){ return '<option value="'+c+'"'+(k.classe===c?' selected':'')+'>'+(c||'—')+'</option>'; }).join('');
  return '<div style="margin-top:10px;background:#f4f8f5;border:1px solid var(--line);border-radius:12px;padding:12px">'
    +'<p class="sub" style="margin:0 0 8px">✏️ Complète <b>avec le parent</b> à côté de toi — chaque modification est enregistrée au journal. (Le droit à l\'image reste famille/bureau : il découle du formulaire signé.)</p>'
    +'<div class="row" style="margin-bottom:8px">'
      +'<div><label>Naissance</label><input id="fe_naissance" type="date" value="'+esc(k.naissance||'')+'" style="width:100%"></div>'
      +'<div><label>Classe</label><select id="fe_classe" style="width:100%">'+opts+'</select></div>'
      +'<div style="flex:2"><label>École</label><input id="fe_ecole" value="'+esc(k.ecole||'')+'" style="width:100%"></div>'
    +'</div>'
    +'<div class="row" style="margin-bottom:8px"><div style="flex:1"><label>🤧 Allergies (écrire « aucune » s\'il n\'y en a pas)</label><input id="fe_allergies" value="'+esc(k.allergies||'')+'" style="width:100%"></div></div>'
    +'<div class="row" style="margin-bottom:8px"><div style="flex:1"><label>🩺 Infos santé (PAI, traitement, asthme…)</label><input id="fe_sante" value="'+esc(k.sante||'')+'" style="width:100%"></div></div>'
    +'<div class="row" style="margin-bottom:10px"><div style="flex:1"><label>👥 Personnes autorisées à récupérer l\'enfant</label><input id="fe_autorises" value="'+esc(k.autorises||'')+'" style="width:100%"></div></div>'
    +'<div class="row" style="gap:8px"><button class="btn win" onclick="famSaveKid(\''+k.id+'\')">💾 Enregistrer</button><button class="btn ghost" onclick="famEditKid(null)">Annuler</button></div>'
  +'</div>';
}
window.famEditKid=function(id){ ME.famEdit=id; renderFamilles(); };
window.famSaveKid=async function(id){
  const payload={ naissance:($('#fe_naissance').value||null), classe:$('#fe_classe').value, ecole:$('#fe_ecole').value.trim(), allergies:$('#fe_allergies').value.trim(), sante:$('#fe_sante').value.trim(), autorises:$('#fe_autorises').value.trim() };
  const {error}=await sb.from('enfants').update(payload).eq('id',id);
  if(error){ toast('Erreur : '+error.message); return; }
  ME.famEdit=null;
  await loadFamilles(); renderFamilles(); toast('✅ Fiche enfant mise à jour');
};
window.famVoirPiece=async function(dossId,key){
  const d=ME.famDoss.find(function(x){ return x.id===dossId; }); if(!d) return;
  const got=d.pieces&&d.pieces[key]; if(!got||!got.path) return;
  try{ const {data,error}=await sb.storage.from('dossiers-periscolaire').createSignedUrl(got.path,3600); if(error||!data){ toast('Pièce indisponible'); return; } spShowDoc(data.signedUrl,(got.name||key)); }
  catch(e){ toast('Pièce indisponible'); }
};
window.famUpload=async function(dossId,key,input){
  const d=ME.famDoss.find(function(x){ return x.id===dossId; }); if(!d) return;
  const file=input.files&&input.files[0]; if(!file) return;
  if(file.size>10*1024*1024){ toast('Fichier trop lourd (max 10 Mo)'); input.value=''; return; }
  const info=$('#famup_'+dossId); if(info) info.textContent='📤 Envoi de « '+(file.name||'pièce')+' »…';
  try{
    const m=(file.name||'').match(/\.[a-z0-9]+$/i); const ext=m?m[0].toLowerCase():'';
    const path=(d.asso_id||ME.asso)+'/'+d.user_id+'/'+key+'-'+Date.now().toString(36)+Math.random().toString(36).slice(2,6)+ext;
    const up=await sb.storage.from('dossiers-periscolaire').upload(path,file,{contentType:file.type||'application/octet-stream',upsert:false});
    if(up.error) throw up.error;
    const pieces=Object.assign({},(d.pieces&&typeof d.pieces==='object')?d.pieces:{});
    pieces[key]={path:path,name:file.name||'',par:'accueil'};
    const r=await sb.from('inscriptions_periscolaire').update({pieces:pieces}).eq('id',d.id);
    if(r.error) throw r.error;
    d.pieces=pieces;
    if(info) info.textContent='';
    renderFamilles(); toast('✅ Pièce déposée pour la famille');
  }catch(e){ if(info) info.textContent=''; toast('Échec du dépôt : '+(e.message||e)); }
};
window.renderFamilles=renderFamilles;

function renderConges(){
  const box=$('#cgList'); if(!box) return;
  if(!ME.conges.length){ box.innerHTML='<p class="empty">Aucune demande pour l\'instant.</p>'; return; }
  box.innerHTML=ME.conges.map(c=>{
    const b={demande:'b-demande',valide:'b-valide',refuse:'b-refuse'}[c.statut]||'b-demande';
    const lab={demande:'En attente',valide:'Validé',refuse:'Refusé'}[c.statut]||c.statut;
    return '<div class="kv"><span class="k">'+esc(c.type||'CP')+' · '+fdate(c.date_debut)+' → '+fdate(c.date_fin)+(c.nb_jours?' · '+euroDays(c.nb_jours)+' j':'')
      +(c.piece&&c.piece.path?' · <button class="reset" style="font-size:12.5px;padding:0" onclick="cgVoirPiece(\''+c.id+'\')">📎 justificatif</button>':'')
      +(c.note_bureau?'<br><span style="font-size:12.5px">📝 '+esc(c.note_bureau)+'</span>':'')+'</span>'
      +'<span class="v"><span class="badge '+b+'">'+lab+'</span>'+(c.statut==='demande'?' <button class="btn ghost" style="padding:4px 10px;font-size:12px" onclick="cgDelete(\''+c.id+'\')">Annuler</button>':'')+'</span></div>';
  }).join('');
}
function renderDocs(){
  const box=$('#docList'); if(!box) return;
  if(!ME.docs.length){ box.innerHTML='<p class="empty">Aucun document partagé pour l\'instant.</p>'; return; }
  box.innerHTML=ME.docs.map(d=>'<div class="doc"><span style="font-size:22px">📄</span><div style="flex:1"><div style="font-weight:700">'+esc(d.name||'Document')+'</div>'+(d.categorie?'<div class="sub" style="margin:0">'+esc(d.categorie)+'</div>':'')+'</div><button class="btn ghost" onclick="docOpen(\''+d.id+'\')">Ouvrir</button></div>').join('');
}
window.docOpen=async function(id){
  const d=ME.docs.find(x=>x.id===id); if(!d) return;
  try{ const {data,error}=await sb.storage.from('personnel-docs').createSignedUrl(d.path,3600); if(error||!data){ toast('Document indisponible'); return; } spShowDoc(data.signedUrl, d.name||d.path||'Document'); }
  catch(e){ toast('Document indisponible'); }
};
window.cgDays=function(){
  const a=$('#cg_debut').value, b=$('#cg_fin').value; if(!a||!b) return;
  try{ const d1=new Date(a+'T00:00:00'), d2=new Date(b+'T00:00:00'); if(d2>=d1){ const n=Math.round((d2-d1)/86400000)+1; if(!$('#cg_jours').value||$('#cg_jours').dataset.auto!=='0') { $('#cg_jours').value=n; $('#cg_jours').dataset.auto='1'; } } }catch(e){}
};
window.cgSend=async function(){
  const type=$('#cg_type').value, debut=$('#cg_debut').value, fin=$('#cg_fin').value, motif=$('#cg_motif').value.trim();
  const jours=parseFloat($('#cg_jours').value)||0;
  if(!debut||!fin){ toast('Indique les dates'); return; }
  if(new Date(fin)<new Date(debut)){ toast('La date de fin est avant le début'); return; }
  let piece={};
  const fEl=document.getElementById('cg_file'); const file=fEl&&fEl.files&&fEl.files[0];
  if(file && ME.fiche){
    const ext=(file.name.split('.').pop()||'bin').toLowerCase();
    const path=ME.fiche.asso_id+'/'+ME.fiche.id+'/conges/'+Date.now().toString(36)+Math.random().toString(36).slice(2,7)+'.'+ext;
    const up=await sb.storage.from('personnel-docs').upload(path,file,{contentType:file.type||'application/octet-stream'});
    if(up.error){ toast('Erreur fichier : '+up.error.message); return; }
    piece={path,name:file.name};
  }
  const {error}=await sb.from('conges').insert({type,date_debut:debut,date_fin:fin,nb_jours:jours,motif,piece});
  if(error){ toast('Erreur : '+error.message); return; }
  $('#cg_motif').value=''; $('#cg_jours').value=''; $('#cg_jours').dataset.auto=''; if(fEl) fEl.value='';
  await loadConges(); renderConges(); toast('✅ Demande envoyée au bureau');
};
window.cgVoirPiece=async function(id){
  const c=ME.conges.find(x=>x.id===id); if(!c||!c.piece||!c.piece.path) return;
  try{ const {data,error}=await sb.storage.from('personnel-docs').createSignedUrl(c.piece.path,3600); if(error||!data){ toast('Indisponible'); return; } spShowDoc(data.signedUrl, (c.piece&&c.piece.name)||'Justificatif'); }
  catch(e){ toast('Indisponible'); }
};
window.cgDelete=async function(id){
  if(!confirm('Annuler cette demande ?')) return;
  const {error}=await sb.from('conges').delete().eq('id',id);
  if(error){ toast('Erreur : '+error.message); return; }
  await loadConges(); renderConges(); toast('Demande annulée');
};

// ===== Visionneuse de documents (aperçu intégré) =====
function docExt(s){ const m=String(s||'').toLowerCase().match(/\.([a-z0-9]+)(?:[?#].*)?$/); return m?m[1]:''; }
window.spShowDoc=function(url,name){
  const ext=docExt(name)||docExt(url);
  const isImg=['png','jpg','jpeg','gif','webp','bmp','heic','heif','avif','svg'].includes(ext);
  const isPdf=ext==='pdf';
  let body;
  if(isImg){ body='<img src="'+url+'" alt="'+esc(name||'')+'" style="max-width:100%;max-height:80vh;border-radius:10px;display:block;margin:0 auto;background:#fff">'; }
  else if(isPdf){ body='<iframe src="'+url+'" title="'+esc(name||'')+'" style="width:100%;height:80vh;border:none;border-radius:10px;background:#fff"></iframe>'; }
  else { body='<div class="empty" style="padding:28px">Ce type de fichier ne s\'affiche pas dans le navigateur.<br><a class="btn win" style="text-decoration:none;margin-top:12px;display:inline-block" href="'+url+'" target="_blank" rel="noopener">⬇️ Ouvrir / télécharger</a></div>'; }
  let ov=document.getElementById('docViewer');
  if(!ov){ ov=document.createElement('div'); ov.id='docViewer'; document.body.appendChild(ov); }
  ov.innerHTML='<div class="dv-backdrop" onclick="spCloseDoc()"></div>'
    +'<div class="dv-card">'
      +'<div class="dv-head"><span class="dv-name">'+esc(name||'Document')+'</span>'
        +'<span style="white-space:nowrap"><a class="btn ghost" style="text-decoration:none;margin-right:6px" href="'+url+'" target="_blank" rel="noopener" title="Télécharger">⬇️</a>'
        +'<button class="btn ghost" onclick="spCloseDoc()">✕ Fermer</button></span></div>'
      +'<div class="dv-body">'+body+'</div>'
    +'</div>';
  ov.style.display='block'; document.body.style.overflow='hidden';
};
window.spCloseDoc=function(){ const ov=document.getElementById('docViewer'); if(ov){ ov.style.display='none'; ov.innerHTML=''; } document.body.style.overflow=''; };
document.addEventListener('keydown',function(e){ if(e.key==='Escape') spCloseDoc(); });

// ===== Bienvenue + boîte à commentaires (💡) =====
function fbMe(){ return { id:(ME.session&&ME.session.user&&ME.session.user.id)||null, asso:ME.asso, name:(((ME.prof&&(ME.prof.full_name||ME.prof.email))||'').split('@')[0]), statut:ME.prof&&ME.prof.statut }; }
function mountFeedback(){
  if(!localStorage.getItem('case_welcome_salarie_v1') && !document.getElementById('welcomeBar')){
    const w=document.createElement('div'); w.id='welcomeBar';
    w.innerHTML='<span>👋 Bienvenue dans ton espace ! On l\'améliore en continu — une idée, un truc à améliorer, un bug&nbsp;? Le bouton <b>💡</b> en bas à droite.</span><button onclick="fbDismissWelcome()">J\'ai compris</button>';
    const hdr=document.querySelector('header'); if(hdr) hdr.insertAdjacentElement('afterend', w); else document.body.insertBefore(w, document.body.firstChild);
  }
  if(!document.getElementById('fbFab')){
    const fab=document.createElement('button'); fab.id='fbFab'; fab.title='Une idée, un commentaire ?'; fab.textContent='💡'; fab.onclick=fbToggle;
    const p=document.createElement('div'); p.id='fbPanel';
    p.innerHTML='<div id="fbHead"><span>💡 Une idée, un commentaire ?</span><button title="Fermer" onclick="fbToggle()">✕</button></div><div id="fbList"></div><div id="fbBar"><textarea id="fbInput" placeholder="Un truc à améliorer, une idée, un bug à signaler ?…"></textarea><button onclick="fbSend()">Envoyer</button></div>';
    document.body.appendChild(fab); document.body.appendChild(p);
  }
}
window.fbDismissWelcome=function(){ try{localStorage.setItem('case_welcome_salarie_v1','1');}catch(e){} const w=document.getElementById('welcomeBar'); if(w) w.remove(); };
window.fbToggle=function(){ const p=document.getElementById('fbPanel'); if(!p) return; const open=!p.classList.contains('open'); p.classList.toggle('open',open); if(open){ fbLoadMine(); setTimeout(()=>{const i=document.getElementById('fbInput'); if(i)i.focus();},60); } };
async function fbLoadMine(){
  const box=document.getElementById('fbList'); if(!box) return; const me=fbMe();
  if(!me.id){ box.innerHTML='<p class="empty" style="padding:10px">Connecte-toi pour commenter.</p>'; return; }
  const {data,error}=await sb.from('suggestions').select('*').eq('author_id',me.id).order('created_at',{ascending:false}).limit(50);
  if(error){ box.innerHTML='<p class="empty" style="padding:10px">Erreur : '+esc(error.message)+'</p>'; return; }
  if(!data||!data.length){ box.innerHTML='<p class="empty" style="padding:10px">Tes commentaires apparaîtront ici. Lance-toi 👇</p>'; return; }
  const ST={nouvelle:'🆕 reçu',vue:'👀 vu',faite:'✅ fait',rejetee:'✖️ écarté'};
  box.innerHTML=data.map(s=>'<div class="fbItem"><div class="fbMeta">'+esc(new Date(s.created_at).toLocaleString('fr-FR',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'}))+' <span style="float:right">'+(ST[s.statut]||'')+'</span></div><div style="white-space:pre-wrap">'+esc(s.body)+'</div></div>').join('');
}
window.fbSend=async function(){
  const inp=document.getElementById('fbInput'); if(!inp) return; const body=inp.value.trim(); if(!body){ toast('Écris ton commentaire'); return; }
  const me=fbMe(); if(!me.id){ toast('Connecte-toi'); return; }
  inp.value='';
  const {error}=await sb.from('suggestions').insert({ asso_id:me.asso, author_id:me.id, author_name:me.name, body, context:'🧑‍💼 Espace salarié' });
  if(error){ toast('Erreur : '+error.message); inp.value=body; return; }
  toast('✅ Merci, c\'est envoyé au bureau'); fbLoadMine();
};

boot();
</script>
